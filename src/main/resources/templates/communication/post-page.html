<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title th:text="${post.authorUsername + ' — SkyFriends'}">SkyFriends — пост</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:#f5f8fb;
            --card:#fff;
            --accent:#1fb6ff;
            --accent-2:#ff9f43;
            --muted:#6b7280;
            --radius:14px;
            --shadow:0 6px 18px rgba(22,28,37,0.08);
        }

        body {
            margin:0;
            font-family:'Inter',system-ui,sans-serif;
            background:linear-gradient(180deg,#eaf6ff 0%,#f5f8fb 60%);
            color:#111827;
            padding:24px;
        }

        .post-page {
            max-width:850px;
            margin:0 auto;
        }

        .post {
            background:var(--card);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            padding:24px;
            display:flex;
            gap:18px;
        }

        .avatar-large {
            width:70px;
            height:70px;
            border-radius:50%;
            background:linear-gradient(135deg,#1fb6ff,#4fd1c5);
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:700;
            color:white;
            font-size:28px;
            flex-shrink:0;
        }

        .body {flex:1;}

        .head {
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            flex-wrap:wrap;
        }

        .head-left {
            display:flex;
            align-items:center;
            gap:8px;
            flex-wrap:wrap;
        }

        .head h3 {
            margin:0;
            font-size:18px;
        }

        .head p {
            margin:0;
            color:var(--accent);
            font-size:14px;
        }

        .head span {
            font-size:13px;
            color:var(--muted);
        }

        .post-actions {
            margin-top:8px;
        }

        .btn-edit {
            color:var(--accent);
            font-size:14px;
            text-decoration:none;
            margin-right:12px;
        }
        .btn-delete {
            color:#e11d48;
            background:none;
            border:none;
            cursor:pointer;
            font-size:14px;
        }

        .content {
            margin-top:14px;
            font-size:16px;
            line-height:1.6;
            color:#1e293b;
        }

        .media {
            margin-top:14px;
        }

        .media img {
            max-width:100%;
            border-radius:10px;
            box-shadow:0 3px 12px rgba(0,0,0,0.08);
            margin-top:8px;
        }

        .comments {
            margin-top:24px;
            background:#f9fafb;
            border-radius:10px;
            padding:14px 16px;
        }

        .comments h4 {
            margin-bottom:12px;
            font-size:17px;
            color:#0f172a;
        }

        .comment {
            border-bottom:1px solid #e5e7eb;
            padding:8px 0;
        }
        .comment:last-child {border:0;}
        .comment strong {font-size:14px;color:#111827;}
        .comment p {margin:4px 0;font-size:14px;color:#374151;}
        .comment div {font-size:12px;color:var(--muted);}

        .add-comment {
            display:flex;
            gap:8px;
            margin-top:10px;
        }

        .add-comment input {
            flex:1;
            border:1px solid #d1d5db;
            border-radius:8px;
            padding:8px 10px;
        }

        .add-comment button {
            background:var(--accent);
            border:0;
            color:white;
            padding:8px 16px;
            border-radius:8px;
            cursor:pointer;
            transition:.2s;
        }
        .add-comment button:hover {background:#0ea5e9;}

        .btn-back {
            display:inline-block;
            background:var(--card);
            color:var(--accent);
            padding:8px 14px;
            border-radius:8px;
            box-shadow:var(--shadow);
            font-weight:500;
            text-decoration:none;
            transition:.2s;
        }
        .btn-back:hover {
            background:#e0f2fe;
            color:#0369a1;
        }


        @media(max-width:768px){
            .post {
                flex-direction:column;
                padding:18px;
            }
            .avatar-large {
                width:60px;height:60px;font-size:24px;
            }
        }
    </style>
</head>
<body>

<!-- общий header -->
<div th:replace="fragments/header :: site-header"></div>

<div class="post-page mt-4">
    <div class="mb-3">
        <a href="javascript:history.back()" class="btn-back">
            ← Назад
        </a>
    </div>

    <div class="post">
        <!-- Аватар -->
        <div class="avatar-large" th:text="${post.authorUsername.substring(0,1)}">H</div>

        <div class="body">
            <div class="head">
                <div class="head-left">
                    <h3 th:text="${post.authorUsername}">Никнейм</h3>
                    <p th:if="${post.authorUsername == #authentication.name}">Вы</p>
                </div>
                <span th:text="${#temporals.format(post.publicationDateTime, 'dd MMM yyyy HH:mm')}">1 час назад</span>
            </div>

            <!-- Кнопки -->
            <div class="post-actions" th:if="${#authentication != null and #authentication.name == post.authorUsername}">
                <a th:href="@{'/communication/post/edit/' + ${post.id}}" class="btn-edit">✏️ Редактировать</a>
                <form th:action="@{'/communication/post/delete/' + ${post.id}}" method="post" style="display:inline;">
                    <button type="submit" class="btn-delete">🗑️ Удалить</button>
                </form>
            </div>

            <!-- Контент -->
            <div class="content" th:text="${post.content}">
                Прыжок с парашютом — это невероятное чувство свободы и адреналина!
            </div>

            <!-- Медиа -->
            <div class="media" th:if="${post.mediaUrls != null}">
                <img th:each="url : ${post.mediaUrls}" th:src="${url}" alt="media"/>
            </div>

            <!-- Комментарии -->
            <div class="comments">
                <h4>Комментарии</h4>
                <div class="comment" th:each="comment : ${post.comments}">
                    <strong th:text="'Пользователь #' + ${comment.userId} + ':'">Елена:</strong>
                    <p th:text="${comment.content}">Комментарий</p>
                    <div>
                        <span th:text="${#temporals.format(comment.createdAt, 'dd.MM.yyyy HH:mm')}">1ч назад</span>
                        <span style="margin-left:10px;" th:text="'❤️ ' + ${comment.likes}">❤️ 0</span>
                    </div>
                </div>

                <!-- Добавить комментарий -->
                <div class="add-comment">
                    <form th:action="@{'/communication/post/' + ${post.id} + '/comment'}" method="post" style="display:flex;gap:8px;width:100%;">
                        <input name="content" placeholder="Напишите комментарий..." />
                        <button type="submit">Отправить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- общий footer -->
<div th:replace="fragments/footer :: site-footer"></div>

</body>
</html>
