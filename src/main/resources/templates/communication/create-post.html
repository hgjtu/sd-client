<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${post} != null ? 'Редактировать пост' : 'Создать пост'"></title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 25px;
            background: #fff;
            border-radius: 0.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .media-preview {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 0.25rem;
            border: 1px solid #dee2e6;
        }
        .preview-wrapper {
            position: relative;
            display: inline-block;
        }
        .removed {
            opacity: 0.5;
            pointer-events: none;
        }
        .removed button {
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-light">

<!-- Подключаем header -->
<div th:replace="fragments/header :: site-header"></div>

<div class="container">
    <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>

    <div class="form-container">
        <h2 class="mb-4" th:text="${post} != null ? 'Редактировать пост' : 'Создать новый пост'"></h2>

        <form id="postForm" method="post">
            <!-- Section -->
            <div class="mb-3">
                <label for="sectionId" class="form-label">Секция</label>
                <select id="sectionId" name="sectionId" class="form-select" required>
                    <option value="">-- Выберите секцию --</option>
                    <option th:each="section : ${sections}"
                            th:value="${section.id}"
                            th:text="${section.nameRu != null ? section.nameRu : section.name}"
                            th:selected="${post != null} ? ${section.id} == ${post.sectionId} : false">
                    </option>
                </select>
            </div>

            <!-- Category -->
            <div class="mb-3">
                <label for="categoryId" class="form-label">Категория</label>
                <select id="categoryId" name="categoryId" class="form-select" required>
                    <option value="">-- Выберите категорию --</option>
                    <!-- Категории группируются по секциям для фильтрации -->
                    <th:block th:each="section : ${sections}">
                        <optgroup th:label="${section.nameRu != null ? section.nameRu : section.name}"
                                  th:attr="data-section-id=${section.id}">
                            <option th:each="category : ${categories}"
                                    th:if="${category.sectionId == section.id}"
                                    th:value="${category.id}"
                                    th:text="${category.nameRu != null ? category.nameRu : category.name}"
                                    th:selected="${post != null} ? ${category.id} == ${post.categoryId} : false">
                            </option>
                        </optgroup>
                    </th:block>
                </select>
            </div>

            <!-- Content -->
            <div class="mb-3">
                <label for="content" class="form-label">Содержимое поста</label>
                <textarea id="content" name="content" class="form-control" rows="5" required
                          th:text="${post != null} ? ${post.content} : ''"
                          placeholder="Введите содержимое поста"></textarea>
            </div>

            <!-- Media Upload -->
            <div class="mb-3">
                <label class="form-label">Медиа (изображения/видео)</label>
                <input type="file"
                       class="form-control"
                       id="mediaInput"
                       accept="image/*,video/*"
                       multiple>

                <div id="previewContainer" class="d-flex flex-wrap gap-2 mt-3">
                    <!-- Существующие медиа -->
                    <th:block th:if="${post != null && post.medias != null && !post.medias.isEmpty()}">
                        <div th:each="media : ${post.medias}"
                             class="preview-wrapper existing-media"
                             th:attr="data-media-id=${media.id}">

                            <!-- Проверка на тип медиа -->
                            <th:block th:if="${media.uploadUrl != null and (media.uploadUrl.contains('.mp4') or media.uploadUrl.contains('.webm') or media.uploadUrl.contains('.mov'))}">
                                <video class="media-preview" controls>
                                    <source th:src="${media.uploadUrl}" type="video/mp4">
                                </video>
                            </th:block>
                            <th:block th:unless="${media.uploadUrl != null and (media.uploadUrl.contains('.mp4') or media.uploadUrl.contains('.webm') or media.uploadUrl.contains('.mov'))}">
                                <img th:src="${media.uploadUrl}" class="media-preview" alt="Media preview">
                            </th:block>

                            <button type="button"
                                    class="btn btn-sm btn-danger position-absolute top-0 end-0 remove-existing"
                                    onclick="removeExistingMedia('[[${media.id}]]', this)">
                                ×
                            </button>
                        </div>
                    </th:block>
                </div>
                <small class="text-muted">Можно загрузить до 10 файлов (изображения или видео). Максимальный размер: 10MB</small>
            </div>

            <div class="d-flex justify-content-end mt-4">
                <a href="javascript:history.back()" class="btn btn-secondary me-2">Отмена</a>
                <button type="submit" class="btn btn-success"
                        th:text="${post != null} ? 'Сохранить изменения' : 'Создать пост'">
                    Создать пост
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Подключаем footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener("DOMContentLoaded", () => {
        // CSRF токены
        const csrfToken = /*[[${_csrf.token}]]*/ null;
        const csrfHeader = /*[[${_csrf.headerName}]]*/ null;

        // Элементы формы
        const sectionSelect = document.getElementById("sectionId");
        const categorySelect = document.getElementById("categoryId");
        const form = document.getElementById("postForm");
        const mediaInput = document.getElementById("mediaInput");
        const previewContainer = document.getElementById("previewContainer");

        // Константы
        const MAX_FILES = 10;
        const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB

        // Состояние
        let pendingFiles = []; // Файлы для загрузки
        let removedMediaIds = []; // ID медиа для удаления
        let postId = /*[[${post != null ? post.id : null}]]*/ null;
        const actionUrl = /*[[${actionUrl}]]*/ '';

        console.log('Post ID:', postId);
        console.log('Action URL:', actionUrl);

        // === Фильтрация категорий по секции ===
        function filterCategories() {
            const selectedSection = sectionSelect.value;

            // Сначала скрываем все optgroup
            categorySelect.querySelectorAll("optgroup").forEach(group => {
                group.style.display = "none";
            });

            // Показываем только выбранную секцию
            if (selectedSection) {
                const targetGroup = categorySelect.querySelector(`optgroup[data-section-id="${selectedSection}"]`);
                if (targetGroup) {
                    targetGroup.style.display = "";
                }
            }

            // Сбрасываем выбор категории если она не в выбранной секции
            const selectedOption = categorySelect.querySelector('option:checked');
            if (selectedOption && selectedOption.value !== "") {
                const selectedGroup = selectedOption.closest('optgroup');
                if (selectedGroup && selectedGroup.dataset.sectionId !== selectedSection) {
                    categorySelect.value = "";
                }
            }
        }

        sectionSelect.addEventListener("change", filterCategories);

        // Инициализируем фильтрацию при загрузке
        filterCategories();

        /* ================================
           📸 Выбор файлов
        ================================ */
        mediaInput?.addEventListener("change", function (event) {
            const files = Array.from(event.target.files);
            const existingMediaCount = document.querySelectorAll('.existing-media:not(.removed)').length;

            if (existingMediaCount + pendingFiles.length + files.length > MAX_FILES) {
                alert(`Можно загрузить максимум ${MAX_FILES} файлов`);
                mediaInput.value = "";
                return;
            }

            for (const file of files) {
                // Проверка типа файла
                if (!file.type.startsWith("image/") && !file.type.startsWith("video/")) {
                    alert(`Файл ${file.name} не является изображением или видео`);
                    continue;
                }

                // Проверка размера
                if (file.size > MAX_FILE_SIZE) {
                    alert(`Файл ${file.name} превышает максимальный размер ${MAX_FILE_SIZE / 1024 / 1024}MB`);
                    continue;
                }

                // Добавляем файл в массив
                pendingFiles.push(file);

                // Создаём preview
                const reader = new FileReader();
                reader.onload = function (e) {
                    createPreview(e.target.result, file);
                };
                reader.readAsDataURL(file);
            }

            // Очищаем input
            mediaInput.value = "";
        });

        /* ================================
           🚀 СОХРАНЕНИЕ ПОСТА (JSON)
        ================================ */
        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            // Валидация
            if (!sectionSelect.value) {
                alert("Выберите секцию");
                return;
            }
            if (!categorySelect.value) {
                alert("Выберите категорию");
                return;
            }

            try {
                // 1. Сначала сохраняем/обновляем пост
                const postData = {
                    sectionId: parseInt(sectionSelect.value),
                    categoryId: parseInt(categorySelect.value),
                    content: document.getElementById("content").value
                };

                console.log('Saving post:', postData);

                const saveResponse = await fetch(actionUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify(postData)
                });

                if (!saveResponse.ok) {
                    const errorText = await saveResponse.text();
                    throw new Error(errorText || "Ошибка сохранения поста");
                }

                // Получаем ID поста
                const responseText = await saveResponse.text();
                postId = responseText ? parseInt(responseText) : postId;

                if (!postId) {
                    throw new Error("Не удалось получить ID поста");
                }

                console.log('Post saved with ID:', postId);

                // 2. Загружаем новые медиа
                if (pendingFiles.length > 0) {
                    await uploadAllMedia();
                }

                // 3. Удаляем помеченные медиа
                if (removedMediaIds.length > 0) {
                    await deleteMarkedMedia();
                }

                // 4. Перенаправляем на страницу поста
                window.location.href = "/communication/post/" + postId;

            } catch (error) {
                console.error('Error:', error);
                alert("Ошибка при сохранении: " + error.message);
            }
        });

        /* ================================
           ☁️ Загрузка медиа
        ================================ */
        async function uploadAllMedia() {
            const uploadedMediaIds = [];

            for (const file of pendingFiles) {
                try {
                    console.log('Uploading file:', file.name);

                    // Получаем presigned URL
                    const uploadResponse = await fetch(`/media/COMMUNICATION/upload-url/item/${postId}`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            [csrfHeader]: csrfToken
                        },
                        body: JSON.stringify({
                            fileName: file.name,
                            contentType: file.type
                        })
                    });

                    if (!uploadResponse.ok) {
                        const errorText = await uploadResponse.text();
                        throw new Error(`Ошибка получения upload-url: ${errorText}`);
                    }

                    const uploadData = await uploadResponse.json();
                    console.log('Upload data:', uploadData);

                    const uploadUrl = uploadData.uploadUrl;
                    const mediaId = uploadData.id;

                    // Загружаем в S3 / MinIO
                    const s3Response = await fetch(uploadUrl, {
                        method: "PUT",
                        body: file,
                        headers: {
                            'Content-Type': file.type
                        }
                    });

                    if (!s3Response.ok) {
                        throw new Error("Ошибка загрузки в хранилище");
                    }

                    // Подтверждаем загрузку
                    const completeResponse = await fetch(`/media/COMMUNICATION/complete/${mediaId}`, {
                        method: "POST",
                        headers: {
                            [csrfHeader]: csrfToken
                        }
                    });

                    if (!completeResponse.ok) {
                        throw new Error("Ошибка подтверждения загрузки");
                    }

                    uploadedMediaIds.push(mediaId);
                    console.log('File uploaded successfully, media ID:', mediaId);

                } catch (error) {
                    console.error('Error uploading file:', file.name, error);
                    alert(`Ошибка при загрузке файла ${file.name}: ${error.message}`);
                }
            }

            // Привязываем все загруженные медиа к посту
            if (uploadedMediaIds.length > 0) {
                await addMediaToPost(uploadedMediaIds);
            }

            pendingFiles = [];
        }

        /* ================================
           🔗 Привязка медиа к посту
        ================================ */
        async function addMediaToPost(mediaIds) {
            try {
                console.log('Adding media to post:', mediaIds);

                const addMediaResponse = await fetch(`/communication/post/add-media/${postId}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify(mediaIds)
                });

                if (!addMediaResponse.ok) {
                    const errorText = await addMediaResponse.text();
                    throw new Error(`Ошибка привязки медиа к посту: ${errorText}`);
                }

                console.log('Media added successfully');
            } catch (error) {
                console.error('Error adding media to post:', error);
                alert("Ошибка при привязке медиа: " + error.message);
            }
        }

        /* ================================
           🖼 Предпросмотр
        ================================ */
        function createPreview(src, file) {
            const wrapper = document.createElement("div");
            wrapper.className = "preview-wrapper pending-media";

            // Создаем элемент в зависимости от типа
            let mediaElement;
            if (file.type.startsWith("video/")) {
                mediaElement = document.createElement("video");
                mediaElement.controls = true;
                mediaElement.className = "media-preview";

                const source = document.createElement("source");
                source.src = src;
                source.type = file.type;
                mediaElement.appendChild(source);
            } else {
                mediaElement = document.createElement("img");
                mediaElement.src = src;
                mediaElement.alt = "Preview";
                mediaElement.className = "media-preview";
            }

            const removeBtn = document.createElement("button");
            removeBtn.type = "button";
            removeBtn.innerHTML = "×";
            removeBtn.className = "btn btn-sm btn-danger position-absolute top-0 end-0";
            removeBtn.onclick = () => {
                // Удаляем файл из массива
                const index = pendingFiles.findIndex(f => f === file);
                if (index !== -1) {
                    pendingFiles.splice(index, 1);
                }
                wrapper.remove();
            };

            wrapper.appendChild(mediaElement);
            wrapper.appendChild(removeBtn);
            previewContainer.appendChild(wrapper);
        }

        /* ================================
           🗑 Удаление существующих медиа
        ================================ */
        window.removeExistingMedia = function(mediaId, button) {
            if (!confirm('Удалить медиа?')) return;

            // Добавляем ID в список удаленных
            if (!removedMediaIds.includes(mediaId)) {
                removedMediaIds.push(mediaId);
            }

            // Помечаем элемент как удаленный
            const wrapper = button.closest('.preview-wrapper');
            if (wrapper) {
                wrapper.classList.add('removed');
                button.disabled = true;
                button.innerHTML = '✓';
            }

            console.log('Marked for removal:', mediaId);
        };

        async function deleteMarkedMedia() {
            if (removedMediaIds.length === 0) return;

            try {
                console.log('Deleting media:', removedMediaIds);

                const deleteResponse = await fetch(`/communication/post/delete-media/${postId}`, {
                    method: "DELETE",
                    headers: {
                        "Content-Type": "application/json",
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify(removedMediaIds)
                });

                if (!deleteResponse.ok) {
                    const errorText = await deleteResponse.text();
                    console.error("Ошибка удаления медиа:", errorText);
                } else {
                    console.log('Media deleted successfully');
                }
            } catch (error) {
                console.error('Error deleting media:', error);
            }
        }
    });
    /*]]>*/
</script>

</body>
</html>
