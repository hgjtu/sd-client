<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title th:text="${post} != null ? 'Редактировать пост' : 'Создать пост'"></title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<!-- Подключаем header -->
<div th:replace="fragments/header :: site-header"></div>

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 th:text="${post} != null ? 'Редактировать пост' : 'Создать новый пост'"></h4>
        </div>
        <div class="card-body">
            <form th:action="@{${actionUrl}}" th:object="${post}" method="post">
                <!-- Section -->
                <div class="mb-3">
                    <label for="section" class="form-label">Секция</label>
                    <select id="section" name="sectionId" class="form-select" required>
                        <option value="">-- Выберите секцию --</option>
                        <option th:each="section : ${sections}"
                                th:value="${section.id}"
                                th:text="${section.nameRu != null ? section.nameRu : section.name}"
                                th:selected="${post != null} ? ${section.id} == ${post.sectionId} : false">
                        </option>
                    </select>
                </div>

                <!-- Category -->
                <div class="mb-3">
                    <label for="category" class="form-label">Категория</label>
                    <select id="category" name="categoryId" class="form-select" required>
                        <option value="">-- Выберите категорию --</option>
                        <!-- Категории группируются по секциям для фильтрации -->
                        <th:block th:each="section : ${sections}">
                            <optgroup th:label="${section.nameRu != null ? section.nameRu : section.name}"
                                      th:attr="data-section-id=${section.id}">
                                <option th:each="category : ${categories}"
                                        th:if="${category.sectionId == section.id}"
                                        th:value="${category.id}"
                                        th:text="${category.nameRu != null ? category.nameRu : category.name}"
                                        th:selected="${post != null} ? ${category.id} == ${post.categoryId} : false">
                                </option>
                            </optgroup>
                        </th:block>
                    </select>
                </div>

                <!-- Content -->
                <div class="mb-3">
                    <label for="content" class="form-label">Содержимое поста</label>
                    <textarea id="content" name="content" class="form-control" rows="5" required
                              th:text="${post != null} ? ${post.content} : ''"></textarea>
                </div>

                <!-- Media URLs -->
                <div class="mb-3">
                    <label class="form-label">Медиа URL-ы</label>
                    <div id="mediaUrlsContainer">
                        <div class="input-group mb-2"
                             th:each="url, stat : ${post != null && post.mediaUrls != null ? post.mediaUrls : {''}}">
                            <input type="url" name="mediaUrls" th:value="${url}"
                                   class="form-control" placeholder="Введите URL картинки/видео">
                            <button type="button" class="btn btn-outline-danger remove-media">✕</button>
                        </div>
                    </div>
                    <button type="button" id="addMediaUrl" class="btn btn-outline-primary btn-sm">+ Добавить медиа</button>
                </div>

                <div class="d-flex justify-content-end mt-4">
                    <a href="/communication" class="btn btn-secondary me-2">Отмена</a>
                    <button type="submit" class="btn btn-success">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
</div>

<!-- Подключаем footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const sectionSelect = document.getElementById("section");
        const categorySelect = document.getElementById("category");

        // === Фильтрация категорий по секции ===
        function filterCategories() {
            const selectedSection = sectionSelect.value;

            // Скрываем все optgroup
            categorySelect.querySelectorAll("optgroup").forEach(group => {
                group.style.display = "none";
            });

            // Показываем только optgroup выбранной секции
            if (selectedSection) {
                const targetGroup = categorySelect.querySelector(`optgroup[data-section-id="${selectedSection}"]`);
                if (targetGroup) {
                    targetGroup.style.display = "";
                }
            }

            // Сбрасываем выбор категории при смене секции
            if (!categorySelect.querySelector('option:checked') ||
                categorySelect.querySelector('option:checked').value === "") {
                categorySelect.value = "";
            }
        }

        sectionSelect.addEventListener("change", filterCategories);

        // Инициализируем фильтрацию при загрузке
        if (sectionSelect.value) {
            filterCategories();
        } else {
            // Если секция не выбрана, скрываем все категории
            categorySelect.querySelectorAll("optgroup").forEach(group => {
                group.style.display = "none";
            });
        }

        // === Добавление/удаление полей для медиа URL ===
        const addMediaBtn = document.getElementById("addMediaUrl");
        const mediaContainer = document.getElementById("mediaUrlsContainer");

        if (addMediaBtn && mediaContainer) {
            addMediaBtn.addEventListener("click", () => {
                const div = document.createElement("div");
                div.classList.add("input-group", "mb-2");
                div.innerHTML = `
                    <input type="url" name="mediaUrls" class="form-control" placeholder="Введите URL картинки/видео">
                    <button type="button" class="btn btn-outline-danger remove-media">✕</button>
                `;
                mediaContainer.appendChild(div);
            });

            mediaContainer.addEventListener("click", (e) => {
                if (e.target.classList.contains("remove-media")) {
                    e.target.closest(".input-group").remove();
                }
            });
        }
    });
</script>

</body>
</html>
