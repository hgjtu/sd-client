<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>SkyFriends — клуб парашютистов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:#f5f8fb;
            --card:#fff;
            --accent:#1fb6ff;
            --accent-2:#ff9f43;
            --muted:#6b7280;
            --radius:14px;
            --shadow:0 6px 18px rgba(22,28,37,0.08);
        }

        * {box-sizing:border-box;}
        body {
            margin:0;
            font-family:'Inter',system-ui,sans-serif;
            background:linear-gradient(180deg,#eaf6ff 0%,#f5f8fb 60%);
            color:#111827;
            padding:24px;
        }

        /* layout */
        .container {
            max-width:1300px;
            margin:0 auto;
            display:grid;
            grid-template-columns:280px 1fr 300px;
            gap:22px;
        }

        /* LEFT: mini profile + news */
        .left {
            position:sticky;
            top:24px;
            align-self:start;
            display:flex;
            flex-direction:column;
            gap:18px;
        }

        .profile {
            background:var(--card);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            padding:18px;
            text-align:center;
        }
        .profile .avatar {
            width:80px;height:80px;margin:0 auto 10px;
            border-radius:50%;
            background:linear-gradient(135deg,var(--accent),#4fd1c5);
            display:flex;align-items:center;justify-content:center;
            color:#fff;font-weight:700;font-size:24px;
        }
        .profile h4 {margin:0;}
        .profile p {color:var(--muted);font-size:13px;margin:4px 0 0;}

        .news-block {
            background:var(--card);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            padding:16px;
        }
        .news-block h5 {margin:0 0 8px 0;}
        .announce {
            padding:8px 0;
            border-bottom:1px solid #f1f5f9;
        }
        .announce:last-child {border:0;}
        .announce strong {display:block;color:#0f172a;font-size:14px;}
        .announce p {margin:2px 0 0;font-size:13px;color:var(--muted);}

        /* CENTER: main feed */
        .center {
            display:flex;
            flex-direction:column;
            gap:18px;
        }

        /* category tabs */
        .tabs {
            display:flex;
            gap:10px;
            background:var(--card);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            padding:8px;
            justify-content:space-around;
            font-weight:600;
        }
        .tab {
            flex:1;
            text-align:center;
            padding:10px 0;
            border-radius:10px;
            cursor:pointer;
            color:var(--muted);
            transition:all .2s;
        }
        .tab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 10px rgba(31,182,255,0.2);
            transform: translateY(-2px);
        }

        /* posts */
        .post {
            background:var(--card);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            padding:16px;
            display:flex;
            gap:12px;
        }
        .post .avatar-small {
            width:56px;height:56px;border-radius:50%;
            background:linear-gradient(135deg,#ff7ab6,#7c3aed);
            color:white;font-weight:700;
            display:flex;align-items:center;justify-content:center;
            flex-shrink:0;
        }
        .post .body {flex:1;}
        .post .head {display:flex;justify-content:space-between;align-items:center;}
        .post .head h4 {margin:0;font-size:15px;}
        .post .head p {margin:0;font-size:13px;color:var(--muted);}
        .post .content {margin-top:8px;font-size:15px;line-height:1.45;}
        .tags {margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;}
        .tag {font-size:13px;background:#eef2ff;padding:6px 10px;border-radius:999px;color:#3730a3;}

        /* reactions + comments */
        .interactions {
            margin-top:12px;
            border-top:1px solid #f1f5f9;
            padding-top:10px;
        }
        .reactions {
            display:flex;gap:8px;flex-wrap:wrap;
        }
        .reaction {
            background:#f8fafc;
            border:1px solid #e5e7eb;
            border-radius:20px;
            padding:6px 12px;
            font-size:14px;
            display:flex;
            align-items:center;
            gap:6px;
            cursor:pointer;
            transition:.2s;
        }
        .reaction:hover {
            background:#e0f2fe;
            border-color:#bae6fd;
        }
        .reaction.reacted {
            font-weight: bold;
            color: #ff4500; /* яркий цвет для активной реакции */
            text-shadow: 0 0 3px #ff4500;
        }

        .comments {
            margin-top:10px;
            background:#f9fafb;
            border-radius:10px;
            padding:10px;
        }
        .comment {
            border-bottom:1px solid #e5e7eb;
            padding:6px 0;
        }
        .comment:last-child {border:0;}
        .comment strong {font-size:14px;}
        .comment p {margin:2px 0 0;font-size:13px;color:#374151;}
        .add-comment {
            display:flex;
            gap:8px;
            margin-top:8px;
        }
        .add-comment input {
            flex:1;
            border:1px solid #d1d5db;
            border-radius:8px;
            padding:8px 10px;
        }
        .add-comment button {
            background:var(--accent);
            border:0;
            color:white;
            padding:8px 14px;
            border-radius:8px;
            cursor:pointer;
        }

        /* RIGHT: subcategories */
        .right {
            position:sticky;
            top:24px;
            align-self:start;
        }
        .right .category {
            background:var(--card);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            padding:14px;
        }
        .right h5 {margin:0 0 8px 0;}
        .subcat {
            padding:8px 10px;
            border-radius:8px;
            cursor:pointer;
            color:#0f172a;
            margin-bottom:4px;
            transition:.2s;
        }
        .subcat.active {
            background: var(--accent);
            color: white;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(31,182,255,0.25);
        }
        .subcat:hover {
            background: #e0f2fe;
            color: #0369a1;
        }

        .comment-actions {
            margin-top: 6px;
            display: flex;
            gap: 10px;
        }

        .comment-actions button {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 13px;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s;
        }

        .comment-actions button:hover {
            color: var(--accent-2);
        }
        .comment-actions .delete-comment-btn {
            color: #ef4444;
        }
        .comment-actions .delete-comment-btn:hover {
            color: #dc2626;
        }

        /* === Комментарии и ответы === */
        .comments {
            margin-top: 15px;
            background: #f9fafb;
            border-radius: 10px;
            padding: 12px;
        }

        .comment-thread {
            border-bottom: 1px solid #e5e7eb;
            padding: 8px 0;
        }

        .comment-thread:last-child {
            border-bottom: none;
        }

        .comment-main {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .comment-content {
            margin: 0;
            font-size: 14px;
            color: #374151;
        }

        .comment-meta {
            font-size: 12px;
            color: #6b7280;
            display: flex;
            gap: 10px;
        }

        .comment-actions {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .comment-actions button {
            background: none;
            border: none;
            font-size: 13px;
            cursor: pointer;
            color: var(--accent);
            transition: color 0.2s;
            padding: 0;
        }

        .comment-actions button:hover {
            color: var(--accent-2);
        }

        .comment-actions .delete-comment-btn {
            color: #ef4444;
        }
        .comment-actions .delete-comment-btn:hover {
            color: #dc2626;
        }

        .replies {
            margin-left: 20px;
            border-left: 2px solid #e5e7eb;
            padding-left: 10px;
        }

        .reply {
            background: #f3f4f6;
            border-radius: 8px;
            padding: 6px;
            margin-top: 6px;
        }

        .add-reply {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .add-reply input,
        .add-comment input {
            flex: 1;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 8px 10px;
        }

        .add-reply button,
        .add-comment button {
            background: var(--accent);
            border: 0;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* === Комментарии (дерево) === */
        .comments { margin-top: 15px; background: #f9fafb; border-radius: 10px; padding: 12px; }
        .comments-rendered { display: flex; flex-direction: column; gap: 8px; }

        .comment-node {
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 1px 3px rgba(16,24,40,0.04);
            border: 1px solid #eef2f5;
        }

        .comment-header { display:flex; justify-content:space-between; align-items:center; gap:10px; }
        .comment-author { font-weight:600; font-size:14px; color:#0f172a; }
        .comment-content { margin:6px 0 8px; font-size:14px; color:#374151; white-space:pre-wrap; }
        .comment-meta { font-size:12px; color:#6b7280; display:flex; gap:10px; align-items:center; }

        .comment-actions { margin-top:8px; display:flex; gap:8px; }
        .comment-actions button {
            background:none;border:0;color:var(--accent);cursor:pointer;padding:0;font-size:13px;
        }
        .comment-actions button:hover { color:var(--accent-2); }
        .comment-actions .delete-comment-btn { color:#ef4444; }
        .comment-actions .delete-comment-btn:hover { color:#dc2626; }

        /* Вложенные ответы */
        .comment-children { margin-left: 18px; margin-top:8px; display:flex; flex-direction:column; gap:8px; }
        /* Форма для быстрого ответа */
        .inline-reply { display:flex; gap:8px; margin-top:8px; }
        .inline-reply input { flex:1; border:1px solid #d1d5db; border-radius:8px; padding:8px 10px; }
        .inline-reply button { background:var(--accent); border:0; color:white; padding:8px 12px; border-radius:8px; cursor:pointer; }

        /* Поле редактирования комментария (инлайн) */
        .edit-input { width:100%; padding:8px 10px; border-radius:8px; border:1px solid #d1d5db; }
        .save-edit-btn { background:var(--accent); color:#fff; border:0; padding:6px 10px; border-radius:6px; cursor:pointer; margin-left:8px; }


        .actions { margin-bottom: 8px; }

        /* responsive */
        @media (max-width:1000px){
            .container{grid-template-columns:1fr;gap:16px;}
            .right{order:3;}
        }
    </style>
</head>
<body>

<!-- Подключаем header -->
<div th:replace="fragments/header :: site-header"></div>

<div class="container">

    <!-- LEFT -->
    <aside class="left">
        <div class="profile">
            <!-- Фото или инициалы -->
            <img
                th:src="${user.photoUrl != null} ? ${user.photoUrl} : '/default-avatar.png'"
                th:onerror="this.onerror=null; this.src='/default-avatar.png'"
                alt="Фото пользователя"
                class="img-fluid rounded-circle border avatar"
                style="width:200px;height:200px;object-fit:cover;">

            <h4 th:text="${user.firstName + ' ' + user.lastName}">SkyFriends</h4>
            <p th:text="${user.username}">Мой профиль клуба</p>
        </div>

        <!-- Кнопки действий -->
        <div class="actions d-flex justify-content-end gap-2">
            <button id="create-post-btn" class="btn btn-primary">Создать пост</button>
        </div>

        <div class="news-block">
            <h5>Мои посты</h5>

            <!-- Если список пуст -->
            <div th:if="${#lists.isEmpty(myPosts)}">
                <p style="font-size:14px;color:var(--muted);margin:0;">У вас пока нет постов.</p>
            </div>

            <!-- Список постов -->
            <div th:each="post : ${myPosts}" class="announce">
                <!-- Отображаем первые 40 символов контента -->
                <strong th:text="${post.content.length() > 40 ? post.content.substring(0, 40) + '…' : post.content}">
                    Текст поста...
                </strong>

                <p th:text="${#temporals.format(post.publicationDateTime, 'dd MMM yyyy HH:mm')}">01 ноя 2025</p>

                <a th:href="@{'/communication/post/' + ${post.id}}"
                   style="font-size:13px;color:var(--accent);text-decoration:none;">Открыть</a>
            </div>
        </div>

    </aside>


    <!-- CENTER -->
    <main class="center">
        <!-- Вкладки (разделы) -->
        <div class="tabs">
            <div class="tab"
                 th:each="section : ${sections}"
                 th:text="${section.nameRu}"
                 th:attr="data-section-id=${section.id}"
                 th:classappend="${section.id == param.sectionId} ? ' active' : ''">
            </div>
        </div>

        <!-- Посты -->
        <div th:each="post : ${posts}" class="post">
            <div class="avatar-small">
                <img th:if="${post.authorInfo.profileMediaUrl != null}"
                     th:src="${post.authorInfo.profileMediaUrl}"
                     th:onerror="this.onerror=null; this.src='/default-avatar.png'"
                     alt="avatar"
                     style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
                <div th:unless="${post.authorInfo.profileMediaUrl != null}"
                     th:text="${post.authorInfo.username.substring(0,1)}"
                     style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
                    H
                </div>
            </div>

            <div class="body">
                <div class="head">
                    <div style="display: flex; align-items: center;">
                        <div style="display: flex; align-items: center; gap: 5px; margin-right: 15px;">
                            <h4 style="margin: 0;" th:text="${post.authorInfo.username}">Никнейм</h4>
                            <p style="margin: 0;" th:if="${post.authorInfo.username == #authentication.name}">Вы</p>
                        </div>
                        <a th:href="@{'/communication/post/' + ${post.id}}"
                           style="font-size:13px;color:var(--accent);text-decoration:none;">Открыть</a>
                    </div>
                    <span style="font-size:13px;color:var(--muted)"
                          th:text="${#temporals.format(post.publicationDateTime, 'dd MMM yyyy HH:mm')}">
                        1 час назад
                    </span>
                </div>

                <!-- Контент поста -->
                <div class="content" th:text="${post.content}">
                    Текст поста
                </div>

                <!-- Медиа -->
                <div class="media" th:if="${post.medias != null and !post.medias.isEmpty()}">
                    <img th:each="url : ${post.medias[0].uploadUrl}" th:src="${url}" alt="media" style="max-width:100%;border-radius:6px;margin-top:5px;"/>
                </div>

                <!-- Реакции -->
                <div class="reactions" style="margin-top:10px;" th:attr="data-post-id=${post.id}">
                    <span class="reaction"
                          th:each="entry : ${post.smileyReactions.entrySet()}"
                          th:utext="${entry.key == 'hearts' ? '❤️ ' : (entry.key == 'likes' ? '👍 ' : entry.key)} + ${entry.value}"
                          th:attr="data-reaction-id=${entry.key}"
                          th:classappend="${post.isReacted == entry.key} ? ' reacted' : ''"
                          style="margin-right:10px;cursor:pointer;">
                    </span>
                </div>


                <!-- Комментарии -->
<!--                <div class="comments"-->
<!--                     th:attr="data-post-id=${post.id}, data-current-user-id=${user.id}">-->

<!--                    &lt;!&ndash; Скрытые элементы — плоский список комментариев, которые прочитает JS &ndash;&gt;-->
<!--                    <div class="raw-comments" style="display:none;">-->
<!--                        <div class="raw-comment"-->
<!--                             th:each="c : ${post.comments}"-->
<!--                             th:attr="-->
<!--                                data-id=${c.id},-->
<!--                                data-post-id=${c.postId},-->
<!--                                data-user-id=${c.userId},-->
<!--                                data-reply-id=${c.replyCommentId},-->
<!--                                data-content=${c.content},-->
<!--                                data-likes=${c.likes},-->
<!--                                data-created=${#temporals.format(c.createdAt, 'dd.MM.yyyy HH:mm')}-->
<!--                                ">-->
<!--                        </div>-->
<!--                    </div>-->

<!--                    &lt;!&ndash; Контейнер, куда JS отрисует уже иерархические комментарии &ndash;&gt;-->
<!--                    <div class="comments-rendered"></div>-->

<!--                    &lt;!&ndash; Форма добавления нового (верхнего) комментария &ndash;&gt;-->
<!--                    <div class="add-comment">-->
<!--                        <input type="text" placeholder="Напишите комментарий..." />-->
<!--                        <button class="send-comment-btn">Отправить</button>-->
<!--                    </div>-->
<!--                </div>-->
                </div>
            </div>
        </main>

    <!-- RIGHT -->
    <aside class="right">
        <div class="category">
            <h5>Подтемы раздела</h5>
            <div class="subcat"
                 th:each="cat : ${categories}"
                 th:text="${cat.nameRu}"
                 th:attr="data-category-id=${cat.id}"
                 th:classappend="${cat.id == param.categoryId} ? ' active' : ''">
                Категория
            </div>
        </div>
    </aside>

</div>

<!-- Подключаем footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute("content");
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute("content");

    document.addEventListener("DOMContentLoaded", () => {
        const tabs = document.querySelectorAll(".tab");
        const subcats = document.querySelectorAll(".subcat");

        // Получаем текущие параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        let currentSectionId = urlParams.get("sectionId");
        const currentCategoryId = urlParams.get("categoryId");

        // --- Если sectionId не задан, используем 1 по умолчанию ---
        if (!currentSectionId) {
            currentSectionId = "1";
        }

        // ===== Подсветка активной вкладки (раздела) =====
        tabs.forEach(tab => {
            const sectionId = tab.getAttribute("data-section-id");
            tab.classList.toggle("active", sectionId === currentSectionId);

            // При клике на вкладку (меняем раздел, сбрасываем категорию)
            tab.addEventListener("click", () => {
                const newSectionId = tab.getAttribute("data-section-id");
                window.location.href = `/communication?sectionId=${newSectionId}`;
            });
        });

        // ===== Подсветка активной категории =====
        subcats.forEach(cat => {
            const categoryId = cat.getAttribute("data-category-id");
            cat.classList.toggle("active", categoryId === currentCategoryId);

            // При клике на категорию (сохраняем текущую секцию)
            cat.addEventListener("click", () => {
                const activeTab = document.querySelector(".tab.active");
                const sectionId = activeTab ? activeTab.getAttribute("data-section-id") : currentSectionId;
                const newCategoryId = cat.getAttribute("data-category-id");
                window.location.href = `/communication?sectionId=${sectionId}&categoryId=${newCategoryId}`;
            });
        });

        // --- Создать пост и Мои посты ---
        document.getElementById("create-post-btn").addEventListener("click", () => {
            window.location.href = "/communication/post/create";
        });

        // ===== Реакции на посты =====
        document.querySelectorAll('.reactions').forEach(reactionsDiv => {
            const postId = reactionsDiv.dataset.postId;

            reactionsDiv.querySelectorAll('.reaction').forEach(reactionSpan => {
                reactionSpan.addEventListener('click', () => {
                    const reactionType = reactionSpan.dataset.reactionId;

                    fetch(`/communication/post/${postId}/add-reaction/${reactionType}`)
                        .then(response => {
                            if (!response.ok) throw new Error('Network response was not ok');

                            // Найдем текущую выделенную реакцию
                            const currentReacted = reactionsDiv.querySelector('.reaction.reacted');

                            // Если есть выделенная реакция и это не та, на которую кликнули
                            if (currentReacted && currentReacted !== reactionSpan) {
                                let partsOld = currentReacted.innerText.trim().split(' ');
                                let countOld = parseInt(partsOld[1] || 0, 10);
                                countOld = Math.max(countOld - 1, 0);
                                currentReacted.innerText = `${partsOld[0]} ${countOld}`;
                                currentReacted.classList.remove('reacted');
                            }

                            // Работа с текущей реакцией
                            const currentText = reactionSpan.innerText.trim();
                            const parts = currentText.split(' ');
                            let count = parseInt(parts[1] || 0, 10);
                            const alreadyReacted = reactionSpan.classList.contains('reacted');

                            if (!alreadyReacted) {
                                count += 1;
                                reactionSpan.classList.add('reacted');
                            } else {
                                count = Math.max(count - 1, 0);
                                reactionSpan.classList.remove('reacted');
                            }

                            const emoji = parts[0];
                            reactionSpan.innerText = `${emoji} ${count}`;
                        })
                        .catch(error => console.error('Error adding reaction:', error));
                });
            });
        });

        // ======== Комментарии: собрать дерево из плоского списка и подключить CRUD ========
        (function(){
            // Вспомог: создать DOM-узел комментария
            function createCommentNode(data, currentUserId) {
                const node = document.createElement('div');
                node.className = 'comment-node';
                node.dataset.commentId = data.id;

                node.innerHTML = `
            <div class="comment-header">
                <div>
                    <div class="comment-author">Пользователь #${data.userId}</div>
                    <div class="comment-meta">${data.created} · <span class="likes">❤️ ${data.likes}</span></div>
                </div>
                <div></div>
            </div>
            <div class="comment-content" data-content>${escapeHtml(data.content)}</div>
            <div class="comment-actions"></div>
            <div class="comment-children"></div>
        `;

                const actions = node.querySelector('.comment-actions');

                // Reply button
                const replyBtn = document.createElement('button');
                replyBtn.className = 'reply-btn';
                replyBtn.textContent = 'Ответить';
                actions.appendChild(replyBtn);

                // Edit & Delete only if owner
                if (String(currentUserId) === String(data.userId)) {
                    const editBtn = document.createElement('button');
                    editBtn.className = 'edit-comment-btn';
                    editBtn.textContent = 'Редактировать';
                    actions.appendChild(editBtn);

                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-comment-btn';
                    delBtn.textContent = 'Удалить';
                    delBtn.style.marginLeft = '6px';
                    actions.appendChild(delBtn);
                }

                return node;
            }

            // безопасное экранирование для вывода в текстовую ноду
            function escapeHtml(unsafe) {
                if (unsafe == null) return '';
                return String(unsafe)
                    .replaceAll('&', '&amp;')
                    .replaceAll('<', '&lt;')
                    .replaceAll('>', '&gt;')
                    .replaceAll('"', '&quot;')
                    .replaceAll("'", '&#039;');
            }

            // Для каждого .comments на странице
            document.querySelectorAll('.comments').forEach(block => {
                const postId = block.dataset.postId;
                const currentUserId = block.dataset.currentUserId;
                const raw = Array.from(block.querySelectorAll('.raw-comment')).map(rc => ({
                    id: rc.dataset.id,
                    postId: rc.dataset.postId,
                    userId: rc.dataset.userId,
                    replyId: rc.dataset.replyId === 'null' || rc.dataset.replyId === '' ? null : rc.dataset.replyId,
                    content: rc.dataset.content,
                    likes: rc.dataset.likes || 0,
                    created: rc.dataset.created
                }));

                const renderedContainer = block.querySelector('.comments-rendered');

                // Построить карту id -> nodeData
                const map = {};
                raw.forEach(r => { map[r.id] = Object.assign({}, r, { children: [] }); });

                // Собрать дерево
                const roots = [];
                raw.forEach(r => {
                    const node = map[r.id];
                    if (r.replyId && map[r.replyId]) {
                        map[r.replyId].children.push(node);
                    } else {
                        roots.push(node);
                    }
                });

                // Рекурсивно отрисовать
                function renderNodes(nodes, parentEl) {
                    nodes.forEach(n => {
                        const commentEl = createCommentNode(n, currentUserId);
                        parentEl.appendChild(commentEl);

                        // обработчики кнопок (reply, edit, delete)
                        const replyBtn = commentEl.querySelector('.reply-btn');
                        replyBtn.addEventListener('click', () => {
                            // не дублируем форму
                            if (commentEl.querySelector('.inline-reply')) return;

                            const form = document.createElement('div');
                            form.className = 'inline-reply';
                            form.innerHTML = `<input type="text" placeholder="Ответить..." /><button>Отправить</button>`;
                            commentEl.appendChild(form);

                            const input = form.querySelector('input');
                            const send = form.querySelector('button');

                            send.addEventListener('click', async () => {
                                const content = input.value.trim();
                                if (!content) return;

                                const body = { postId: Number(postId), replyCommentId: Number(n.id), content };
                                try {
                                    const resp = await fetch('/communication/post/comment/add', {
                                        method: 'POST',
                                        headers: {
                                            "Content-Type": "application/json",
                                            [csrfHeader]: csrfToken
                                        },
                                        body: JSON.stringify(body)
                                    });
                                    if (!resp.ok) throw new Error('Ошибка добавления ответа');
                                    window.location.reload();
                                } catch (err) { console.error(err); }
                            });
                        });

                        const editBtn = commentEl.querySelector('.edit-comment-btn');
                        if (editBtn) {
                            editBtn.addEventListener('click', () => {
                                const contentEl = commentEl.querySelector('[data-content]');
                                const old = contentEl.textContent;
                                const input = document.createElement('input');
                                input.className = 'edit-input';
                                input.value = old;
                                contentEl.replaceWith(input);

                                // добавить кнопки сохранить/отменить
                                const save = document.createElement('button');
                                save.className = 'save-edit-btn';
                                save.textContent = 'Сохранить';
                                const actions = commentEl.querySelector('.comment-actions');
                                actions.appendChild(save);

                                save.addEventListener('click', async () => {
                                    const newText = input.value.trim();
                                    if (!newText) return;
                                    const body = { postId: Number(postId), replyCommentId: null, content: newText };
                                    try {
                                        const resp = await fetch(`/communication/post/comment/edit/${n.id}`, {
                                            method: 'POST',
                                            headers: {
                                                "Content-Type": "application/json",
                                                [csrfHeader]: csrfToken
                                            },
                                            body: JSON.stringify(body)
                                        });
                                        if (!resp.ok) throw new Error('Ошибка редактирования');
                                        window.location.reload();
                                    } catch (err) { console.error(err); }
                                });
                            });
                        }

                        const delBtn = commentEl.querySelector('.delete-comment-btn');
                        if (delBtn) {
                            delBtn.addEventListener('click', async () => {
                                if (!confirm('Удалить комментарий?')) return;
                                try {
                                    const resp = await fetch(`/communication/post/comment/delete/${n.id}`, {
                                        method: 'POST',
                                        headers: {
                                            "Content-Type": "application/json",
                                            [csrfHeader]: csrfToken
                                        }, });
                                    if (!resp.ok) throw new Error('Ошибка удаления');
                                    window.location.reload();
                                } catch (err) { console.error(err); }
                            });
                        }

                        // рендер дочерних
                        if (n.children && n.children.length) {
                            const childrenContainer = commentEl.querySelector('.comment-children');
                            renderNodes(n.children, childrenContainer);
                        }
                    });
                }

                // Запуск отрисовки
                renderNodes(roots, renderedContainer);

                // --- хендлер добавления нового корневого комментария ---
                const addInput = block.querySelector('.add-comment input');
                const addBtn = block.querySelector('.add-comment .send-comment-btn');
                addBtn.addEventListener('click', async () => {
                    const content = addInput.value.trim();
                    if (!content) return;
                    const body = { postId: Number(postId), replyCommentId: null, content };
                    try {
                        const resp = await fetch('/communication/post/comment/add', {
                            method: 'POST',
                            headers: {
                                "Content-Type": "application/json",
                                [csrfHeader]: csrfToken
                            },
                            body: JSON.stringify(body)
                        });
                        if (!resp.ok) throw new Error('Ошибка добавления комментария');
                        window.location.reload();
                    } catch (err) { console.error(err); }
                });
            });
        })();

    });
</script>


</body>
</html>
