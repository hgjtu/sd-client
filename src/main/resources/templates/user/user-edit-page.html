<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${userEditRequest.username} + ' — Редактирование профиля'">
        Редактирование профиля
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- ТВОЙ ОБЩИЙ CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" th:href="@{/css/profile-edit.css}">
</head>

<body class="profile-page">

<!-- Header -->
<div th:replace="fragments/header :: site-header"></div>

<main class="container py-4">

    <!-- Верхняя плашка -->
    <section class="hero-profile">
        <h1 th:text="${userEditRequest.username}">Username</h1>
        <p>Редактирование профиля</p>
    </section>

    <!-- Карточка -->
    <div class="card border-0 shadow-lg edit-card">

        <div class="card-header edit-header">
            <h5 class="mb-0">
                <i class="bi bi-person-gear me-2"></i>
                Настройки профиля
            </h5>
        </div>

        <div class="card-body p-4 p-lg-5">

            <form th:action="@{/profile/edit}"
                  th:object="${userEditRequest}"
                  method="post"
                  class="row g-4">

                <!-- Username -->
                <div class="col-md-6">
                    <label for="username" class="form-label modern-label">
                        Имя пользователя
                    </label>

                    <input type="text"
                           id="username"
                           th:value="${userEditRequest.username}"
                           name="username"
                           class="form-control modern-input readonly-input"
                           readonly>
                </div>

                <!-- First name -->
                <div class="col-md-6">
                    <label for="firstName" class="form-label modern-label">
                        Имя
                    </label>

                    <input type="text"
                           id="firstName"
                           th:value="${userEditRequest.firstName}"
                           th:field="*{firstName}"
                           class="form-control modern-input"
                           placeholder="Введите имя">
                </div>

                <!-- Last name -->
                <div class="col-md-6">
                    <label for="lastName" class="form-label modern-label">
                        Фамилия
                    </label>

                    <input type="text"
                           id="lastName"
                           th:value="${userEditRequest.lastName}"
                           th:field="*{lastName}"
                           class="form-control modern-input"
                           placeholder="Введите фамилию">
                </div>

                <!-- Dropzone -->
                <div class="col-md-6">
                    <label for="homeDropzone" class="form-label modern-label">
                        Базовый аэродром
                    </label>

                    <input type="text"
                           id="homeDropzone"
                           th:value="${userEditRequest.homeDropzone}"
                           th:field="*{homeDropzone}"
                           class="form-control modern-input"
                           placeholder="Введите название аэродрома">
                </div>

                <!-- Licenses -->
                <div class="col-12">
                    <label class="form-label modern-label">
                        Лицензии
                    </label>

                    <div id="licenseInput" class="tag-input-container modern-license-box">

                        <span class="tag"
                              th:each="license : ${userEditRequest.licenses}">
                            <span th:text="${license}"></span>
                            <button type="button" onclick="removeTag(this)">×</button>
                        </span>

                        <input type="text"
                               id="licenseTextInput"
                               placeholder="Введите и нажмите Enter">

                    </div>

                    <input type="hidden"
                           id="licensesHidden"
                           th:field="*{licenses}">

                    <small class="text-muted">
                        Нажмите Enter или запятую, чтобы добавить лицензию
                    </small>
                </div>

                <!-- Bio -->
                <div class="col-12">
                    <label for="bio" class="form-label modern-label">
                        О себе
                    </label>

                    <textarea id="bio"
                              th:text="${userEditRequest.bio}"
                              th:field="*{bio}"
                              class="form-control modern-input"
                              rows="5"
                              placeholder="Расскажите о себе..."></textarea>
                </div>

                <!-- Buttons -->
                <div class="col-12 d-flex justify-content-between flex-wrap gap-3 pt-2">

                    <a th:href="@{/profile}"
                       class="btn cancel-btn">
                        <i class="bi bi-arrow-left me-2"></i>
                        Отмена
                    </a>

                    <button type="submit"
                            class="btn save-btn"
                            onclick="serializeLicenses()">

                        <i class="bi bi-check-circle me-2"></i>
                        Сохранить изменения
                    </button>

                </div>

            </form>

        </div>
    </div>

</main>

<!-- Footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS НЕ МЕНЯЕМ -->
<script>
    const input = document.getElementById('licenseTextInput');
    const container = document.getElementById('licenseInput');
    const hiddenInput = document.getElementById('licensesHidden');

    function removeTag(btn) {
        btn.parentElement.remove();
    }

    input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ',') {
            e.preventDefault();
            const value = input.value.trim();
            if (value !== '') {
                const tag = document.createElement('span');
                tag.className = 'tag';
                tag.innerHTML =
                    `<span>${value}</span><button type="button" onclick="removeTag(this)">×</button>`;
                container.insertBefore(tag, input);
                input.value = '';
            }
        }
    });

    function serializeLicenses() {
        const tags =
            Array.from(container.querySelectorAll('.tag span'))
                .map(el => el.textContent);

        hiddenInput.value = tags.join(',');
    }
</script>

</body>
</html>
