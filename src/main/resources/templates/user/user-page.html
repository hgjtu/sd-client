<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${user.username} + ' — Профиль парашютиста'">Профиль парашютиста</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Header -->
<div th:replace="fragments/header :: site-header"></div>

<main class="container py-4">

    <!-- Карточка профиля -->
    <div class="card mb-4 shadow-sm">
        <div class="row g-0">
            <div class="col-md-4 text-center p-3">
                <img th:src="${user.photoUrl != null} ? ${user.photoUrl} : '/default-avatar.png'"
                     alt="Фото пользователя"
                     class="img-fluid rounded-circle border" style="max-width: 200px;">
                <h3 class="mt-3" th:text="${user.username}">Username</h3>
                <p th:if="${user.firstName}" th:text="${user.firstName}" class="text-muted"></p>
                <p th:if="${user.lastName}" th:text="${user.lastName}" class="text-muted"></p>

                <!-- Кнопки видны только владельцу -->
                <div th:if="${#authentication != null and #authentication.name == user.username}">
                    <a th:href="@{/user/edit}" class="btn btn-outline-primary btn-sm me-2">Редактировать профиль</a>
                    <a th:href="@{/user/visibility}" class="btn btn-outline-secondary btn-sm">Настроить видимость</a>
                </div>
            </div>

            <div class="col-md-8 p-4">
                <h5>Информация о парашютисте</h5>
                <table class="table table-borderless align-middle">
                    <tbody>
                    <tr>
                        <th>Лицензия:</th>
                        <td th:text="${user.licenses ?: '—'}">—</td>
                    </tr>
                    <tr>
                        <th>Базовый аэродром:</th>
                        <td th:text="${user.homeDropzone ?: '—'}">—</td>
                    </tr>
                    <tr>
                        <th>О себе:</th>
                        <td th:text="${user.bio ?: 'Пока ничего не рассказано.'}">
                            Пока ничего не рассказано.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Логбук -->
    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Логбук</h5>

            <!-- Кнопки видны только владельцу -->
            <div th:if="${#authentication != null and #authentication.name == user.username}">
                <a th:href="@{/logbook/add}" class="btn btn-sm btn-primary">Добавить запись</a>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Дата</th>
                    <th>Место</th>
                    <th>Тип прыжка</th>
                    <th>Высота</th>
                    <th>Заметки</th>
                    <th th:if="${#authentication != null and #authentication.name == user.username}">
                        Действия
                    </th>

                </tr>
                </thead>
                <tbody>
                <tr th:each="jump, iStat : ${user.jumps}">
                    <td th:text="${iStat.index + 1}">Нет данных</td>
                    <td th:text="${jump.date}">Нет данных</td>
                    <td th:text="${jump.location}">Нет данных</td>
                    <td th:text="${jump.type}">Нет данных</td>
                    <td th:text="${jump.altitude} + ' м'">Нет данных</td>
                    <td th:text="${jump.notes ?: '—'}">Нет данных</td>

                    <td th:if="${#authentication != null and #authentication.name == user.username}">
                        <a th:href="@{'/logbook/edit/' + ${jump.id}}" class="btn btn-sm btn-outline-secondary">✏️</a>
                        <a th:href="@{'/logbook/delete/' + ${jump.id}}" class="btn btn-sm btn-outline-danger">🗑️</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
