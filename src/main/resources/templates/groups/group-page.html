<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <title th:text="${group.groupName + ' — SkyFriends'}">SkyFriends — группа</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">

    <style>
        :root {
            --bg:#f5f8fb;
            --card:#fff;
            --accent:#1fb6ff;
            --accent-2:#ff9f43;
            --muted:#6b7280;
            --radius:14px;
            --shadow:0 6px 18px rgba(22,28,37,0.08);
        }

        body {
            margin:0;
            font-family:'Inter',system-ui,sans-serif;
            background:linear-gradient(180deg,#eaf6ff 0%,#f5f8fb 60%);
            color:#111827;
            padding:24px;
        }

        .post-page {
            max-width:850px;
            margin:0 auto;
        }

        .post {
            background:var(--card);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            padding:24px;
            display:flex;
            gap:18px;
        }

        .avatar-large {
            width:70px;
            height:70px;
            border-radius:50%;
            background:linear-gradient(135deg,#1fb6ff,#4fd1c5);
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:700;
            color:white;
            font-size:28px;
            flex-shrink:0;
        }

        .body {flex:1;}

        .head {
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            flex-wrap:wrap;
        }

        .head-left {
            display:flex;
            align-items:center;
            gap:8px;
            flex-wrap:wrap;
        }

        .head h3 {
            margin:0;
            font-size:18px;
        }

        .head p {
            margin:0;
            color:var(--accent);
            font-size:14px;
        }

        .head span {
            font-size:13px;
            color:var(--muted);
        }

        .post-actions {
            margin-top:8px;
        }

        .btn-edit {
            color:var(--accent);
            font-size:14px;
            text-decoration:none;
            margin-right:12px;
        }
        .btn-delete {
            color:#e11d48;
            background:none;
            border:none;
            cursor:pointer;
            font-size:14px;
        }

        .content {
            margin-top:14px;
            font-size:16px;
            line-height:1.6;
            color:#1e293b;
        }

        .media {
            margin-top:14px;
        }

        .media img {
            max-width:100%;
            border-radius:10px;
            box-shadow:0 3px 12px rgba(0,0,0,0.08);
            margin-top:8px;
        }

        .comments {
            margin-top:24px;
            background:#f9fafb;
            border-radius:10px;
            padding:14px 16px;
        }

        .comments h4 {
            margin-bottom:12px;
            font-size:17px;
            color:#0f172a;
        }

        .comment {
            border-bottom:1px solid #e5e7eb;
            padding:8px 0;
        }
        .comment:last-child {border:0;}
        .comment strong {font-size:14px;color:#111827;}
        .comment p {margin:4px 0;font-size:14px;color:#374151;}
        .comment div {font-size:12px;color:var(--muted);}

        .add-comment {
            display:flex;
            gap:8px;
            margin-top:10px;
        }

        .add-comment input {
            flex:1;
            border:1px solid #d1d5db;
            border-radius:8px;
            padding:8px 10px;
        }

        .add-comment button {
            background:var(--accent);
            border:0;
            color:white;
            padding:8px 16px;
            border-radius:8px;
            cursor:pointer;
            transition:.2s;
        }
        .add-comment button:hover {background:#0ea5e9;}

        .btn-back {
            display:inline-block;
            background:var(--card);
            color:var(--accent);
            padding:8px 14px;
            border-radius:8px;
            box-shadow:var(--shadow);
            font-weight:500;
            text-decoration:none;
            transition:.2s;
        }
        .btn-back:hover {
            background:#e0f2fe;
            color:#0369a1;
        }

        .reactions .reaction:hover {
            background:#e0f2fe;
            border-color:#bae6fd;
        }

        .reactions .reaction.reacted {
            font-weight: bold;
            color: #ff4500; /* яркий цвет для активной реакции */
            text-shadow: 0 0 3px #ff4500;
        }

        .comments {
            margin-top:10px;
            background:#f9fafb;
            border-radius:10px;
            padding:10px;
        }
        .comment {
            border-bottom:1px solid #e5e7eb;
            padding:6px 0;
        }
        .comment:last-child {border:0;}
        .comment strong {font-size:14px;}
        .comment p {margin:2px 0 0;font-size:13px;color:#374151;}
        .add-comment {
            display:flex;
            gap:8px;
            margin-top:8px;
        }
        .add-comment input {
            flex:1;
            border:1px solid #d1d5db;
            border-radius:8px;
            padding:8px 10px;
        }
        .add-comment button {
            background:var(--accent);
            border:0;
            color:white;
            padding:8px 14px;
            border-radius:8px;
            cursor:pointer;
        }

        /* RIGHT: subcategories */
        .right {
            position:sticky;
            top:24px;
            align-self:start;
        }
        .right .category {
            background:var(--card);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            padding:14px;
        }
        .right h5 {margin:0 0 8px 0;}
        .subcat {
            padding:8px 10px;
            border-radius:8px;
            cursor:pointer;
            color:#0f172a;
            margin-bottom:4px;
            transition:.2s;
        }
        .subcat.active {
            background: var(--accent);
            color: white;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(31,182,255,0.25);
        }
        .subcat:hover {
            background: #e0f2fe;
            color: #0369a1;
        }

        .comment-actions {
            margin-top: 6px;
            display: flex;
            gap: 10px;
        }

        .comment-actions button {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 13px;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s;
        }

        .comment-actions button:hover {
            color: var(--accent-2);
        }
        .comment-actions .delete-comment-btn {
            color: #ef4444;
        }
        .comment-actions .delete-comment-btn:hover {
            color: #dc2626;
        }

        /* === Комментарии и ответы === */
        .comments {
            margin-top: 15px;
            background: #f9fafb;
            border-radius: 10px;
            padding: 12px;
        }

        .comment-thread {
            border-bottom: 1px solid #e5e7eb;
            padding: 8px 0;
        }

        .comment-thread:last-child {
            border-bottom: none;
        }

        .comment-main {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .comment-content {
            margin: 0;
            font-size: 14px;
            color: #374151;
        }

        .comment-meta {
            font-size: 12px;
            color: #6b7280;
            display: flex;
            gap: 10px;
        }

        .comment-actions {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .comment-actions button {
            background: none;
            border: none;
            font-size: 13px;
            cursor: pointer;
            color: var(--accent);
            transition: color 0.2s;
            padding: 0;
        }

        .comment-actions button:hover {
            color: var(--accent-2);
        }

        .comment-actions .delete-comment-btn {
            color: #ef4444;
        }
        .comment-actions .delete-comment-btn:hover {
            color: #dc2626;
        }

        .replies {
            margin-left: 20px;
            border-left: 2px solid #e5e7eb;
            padding-left: 10px;
        }

        .reply {
            background: #f3f4f6;
            border-radius: 8px;
            padding: 6px;
            margin-top: 6px;
        }

        .add-reply {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .add-reply input,
        .add-comment input {
            flex: 1;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 8px 10px;
        }

        .add-reply button,
        .add-comment button {
            background: var(--accent);
            border: 0;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* === Комментарии (дерево) === */
        .comments { margin-top: 15px; background: #f9fafb; border-radius: 10px; padding: 12px; }
        .comments-rendered { display: flex; flex-direction: column; gap: 8px; }

        .comment-node {
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 1px 3px rgba(16,24,40,0.04);
            border: 1px solid #eef2f5;
        }

        .comment-header { display:flex; justify-content:space-between; align-items:center; gap:10px; }
        .comment-author { font-weight:600; font-size:14px; color:#0f172a; }
        .comment-content { margin:6px 0 8px; font-size:14px; color:#374151; white-space:pre-wrap; }
        .comment-meta { font-size:12px; color:#6b7280; display:flex; gap:10px; align-items:center; }

        .comment-actions { margin-top:8px; display:flex; gap:8px; }
        .comment-actions button {
            background:none;border:0;color:var(--accent);cursor:pointer;padding:0;font-size:13px;
        }
        .comment-actions button:hover { color:var(--accent-2); }
        .comment-actions .delete-comment-btn { color:#ef4444; }
        .comment-actions .delete-comment-btn:hover { color:#dc2626; }

        /* Вложенные ответы */
        .comment-children { margin-left: 18px; margin-top:8px; display:flex; flex-direction:column; gap:8px; }
        /* Форма для быстрого ответа */
        .inline-reply { display:flex; gap:8px; margin-top:8px; }
        .inline-reply input { flex:1; border:1px solid #d1d5db; border-radius:8px; padding:8px 10px; }
        .inline-reply button { background:var(--accent); border:0; color:white; padding:8px 12px; border-radius:8px; cursor:pointer; }

        /* Поле редактирования комментария (инлайн) */
        .edit-input { width:100%; padding:8px 10px; border-radius:8px; border:1px solid #d1d5db; }
        .save-edit-btn { background:var(--accent); color:#fff; border:0; padding:6px 10px; border-radius:6px; cursor:pointer; margin-left:8px; }

        /* Стили для меток пользователей */
        .comment-badges {
            margin-left: 8px;
            display: inline-flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .badge-organizer {
            background: linear-gradient(135deg, #ff9f43, #ff6b35);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
            letter-spacing: 0.3px;
        }

        .badge-participant {
            background: #10b981;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
        }

        .comment-author {
            font-weight: 700;
            font-size: 14px;
            color: #0f172a;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        @media(max-width:768px){
            .post {
                flex-direction:column;
                padding:18px;
            }
            .avatar-large {
                width:60px;height:60px;font-size:24px;
            }
        }
    </style>
</head>

<body>

<!-- header -->
<div th:replace="fragments/header :: site-header"></div>

<div class="post-page mt-4">

    <div class="mb-3">
        <a href="/jump-group" class="btn-back">
            ← Назад
        </a>
    </div>

    <div class="post">

        <!-- Аватар группы -->
        <div class="avatar-large"
             th:text="${group.groupName.substring(0,1)}">G</div>

        <div class="body">

            <!-- HEAD -->
            <div class="head">
                <div class="head-left">
                    <h3 th:text="${group.groupName}">Название группы</h3>
                    <p th:if="${group.participantBool == true}">Вы участник</p>
                </div>

                <span th:text="${#temporals.format(group.jumpDateTime,'dd MMM yyyy HH:mm')}">
                    01 янв 2026 12:00
                </span>
            </div>

            <!-- META -->
            <div class="content">
                <p>
                    📍 <strong th:text="${group.jumpPlace}">Место</strong><br>
                    👤 Организатор:
                    <strong th:text="${group.organizerInfo.username}">user</strong><br>
                    🎯 Уровень подготовки:
                    <strong th:text="${group.trainingLevel}"></strong><br>
                    👥 Участников:
                    <strong th:text="${#lists.size(group.participants)}"></strong>
                    /
                    <strong th:text="${group.maxParticipants}"></strong>
                </p>
            </div>

            <!-- DESCRIPTION -->
            <div class="content" th:text="${group.description}">
                Описание группы
            </div>

            <!-- ACTIONS -->
            <div class="post-actions">

                <!-- Вступить -->
                <form th:if="${group.participantBool != true}"
                      th:action="@{'/jump-group/join-group/' + ${group.id}}"
                      method="post"
                      style="display:inline;">
                    <button class="btn btn-primary">
                        ➕ Вступить
                    </button>
                </form>

                <!-- Выйти -->
                <form th:if="${group.participantBool == true}"
                      th:action="@{'/jump-group/join-group/' + ${group.id}}"
                      method="post"
                      style="display:inline;"
                      id="leaveGroupForm">

                    <!-- добавили data-count -->
                    <button type="submit"
                            class="btn btn-outline-danger"
                            id="leaveGroupBtn"
                            th:attr="data-count=${#lists.size(group.participants)}">
                        🚪 Выйти
                    </button>
                </form>

                <!-- Кнопки -->
<!--                <div class="post-actions" th:if="${#authentication != null and #authentication.name == group.organizerId}">-->
                <div th:if="${#authentication != null}">
                    <a th:href="@{'/jump-group/edit/' + ${group.id}}" class="btn-edit">✏️ Редактировать</a>
                    <form th:action="@{'/jump-group/delete/' + ${group.id}}" method="post" style="display:inline;">
                        <button type="submit" class="btn-delete">🗑️ Удалить</button>
                    </form>
                </div>

            </div>

            <!-- ================= COMMENTS ================= -->
            <div class="comments"
                 th:attr="data-group-id=${group.id}, data-current-user-id=${user.id}, data-organizer-id=${group.organizerInfo.id}">

                <h4>Комментарии</h4>

                <!-- Плоский список (для JS) -->
                <div class="raw-comments" style="display:none;">
                    <div class="raw-comment"
                         th:each="c : ${group.comments}"
                         th:attr="
                                data-id=${c.comment.id},
                                data-user-id=${c.comment.userId},
                                data-reply-id=${c.comment.replyCommentId},
                                data-content=${c.comment.content},
                                data-likes=${c.comment.likes},
                                data-created=${#temporals.format(c.comment.createdAt,'dd.MM.yyyy HH:mm')},
                                data-is-participant=${c.participant}
                             ">
                    </div>
                </div>

                <!-- JS-рендер -->
                <div class="comments-rendered"></div>

                <!-- Добавить комментарий -->
                <div class="add-comment">
                    <input type="text" placeholder="Напишите комментарий..." />
                    <button class="send-comment-btn">Отправить</button>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<!-- ================= JS ================= -->
<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute("content");
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute("content");

    document.addEventListener("DOMContentLoaded", () => {

        // === КОММЕНТАРИИ ДЛЯ ГРУПП (аналог постов) ===
        document.querySelectorAll('.comments').forEach(block => {

            const groupId = block.dataset.groupId;
            const currentUserId = block.dataset.currentUserId;
            const organizerId = block.dataset.organizerId;

            const raw = Array.from(block.querySelectorAll('.raw-comment')).map(rc => ({
                id: rc.dataset.id,
                userId: rc.dataset.userId,
                replyId: rc.dataset.replyId === 'null' || rc.dataset.replyId === '' ? null : rc.dataset.replyId,
                content: rc.dataset.content,
                likes: rc.dataset.likes || 0,
                created: rc.dataset.created,
                isParticipant: rc.dataset.isParticipant === 'true',
                username: rc.dataset.username || `Пользователь #${rc.dataset.userId}`
            }));

            const rendered = block.querySelector('.comments-rendered');

            const map = {};
            raw.forEach(r => map[r.id] = {...r, children: []});

            const roots = [];
            raw.forEach(r => {
                if (r.replyId && map[r.replyId]) {
                    map[r.replyId].children.push(map[r.id]);
                } else {
                    roots.push(map[r.id]);
                }
            });

            function escapeHtml(s) {
                return String(s)
                    .replaceAll('&','&amp;')
                    .replaceAll('<','&lt;')
                    .replaceAll('>','&gt;');
            }

            function getBadges(comment) {
                let badges = '';

                // Метка организатора (владелец группы)
                if (String(comment.userId) === String(organizerId)) {
                    badges += '<span class="badge-organizer">👑 Организатор</span> ';
                }

                // Метка участника
                if (comment.isParticipant && String(comment.userId) !== String(organizerId)) {
                    badges += '<span class="badge-participant">✓ Участник</span> ';
                }

                return badges;
            }

            function render(nodes, parent) {
                nodes.forEach(n => {
                    const el = document.createElement('div');
                    el.className = 'comment-node';
                    el.dataset.commentId = n.id;

                    const badges = getBadges(n);

                    el.innerHTML = `
            <div class="comment-header">
                <div>
                    <div class="comment-author">
                        ${escapeHtml(n.username)}
                        ${badges ? `<span class="comment-badges">${badges}</span>` : ''}
                    </div>
                    <div class="comment-meta">${n.created}</div>
                </div>
            </div>
            <div class="comment-content" data-content>${escapeHtml(n.content)}</div>
            <div class="comment-actions"></div>
            <div class="comment-children"></div>
        `;

                    const actions = el.querySelector('.comment-actions');

                    /* ===== Ответить ===== */
                    const replyBtn = document.createElement('button');
                    replyBtn.textContent = 'Ответить';
                    actions.appendChild(replyBtn);

                    replyBtn.onclick = () => {
                        if (el.querySelector('.inline-reply')) return;

                        const form = document.createElement('div');
                        form.className = 'inline-reply';
                        form.innerHTML = `<input type="text" placeholder="Напишите ответ..."><button>Отправить</button>`;
                        el.appendChild(form);

                        form.querySelector('button').onclick = async () => {
                            const text = form.querySelector('input').value.trim();
                            if (!text) return;

                            await fetch('/jump-group/comment/add', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    [csrfHeader]: csrfToken
                                },
                                body: JSON.stringify({
                                    groupId: Number(groupId),
                                    replyCommentId: Number(n.id),
                                    content: text
                                })
                            });

                            location.reload();
                        };
                    };

                    /* ===== Редактировать / Удалить (только автор) ===== */
                    if (String(currentUserId) === String(n.userId)) {

                        // Редактировать
                        const editBtn = document.createElement('button');
                        editBtn.textContent = 'Редактировать';
                        actions.appendChild(editBtn);

                        editBtn.onclick = () => {
                            const contentEl = el.querySelector('[data-content]');
                            const oldText = contentEl.textContent;

                            const input = document.createElement('input');
                            input.className = 'edit-input';
                            input.value = oldText;

                            contentEl.replaceWith(input);

                            const saveBtn = document.createElement('button');
                            saveBtn.className = 'save-edit-btn';
                            saveBtn.textContent = 'Сохранить';
                            actions.appendChild(saveBtn);

                            saveBtn.onclick = async () => {
                                const newText = input.value.trim();
                                if (!newText) return;

                                await fetch(`/jump-group/comment/edit/${n.id}`, {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        [csrfHeader]: csrfToken
                                    },
                                    body: JSON.stringify({
                                        groupId: Number(groupId),
                                        content: newText
                                    })
                                });

                                location.reload();
                            };
                        };

                        // Удалить
                        const delBtn = document.createElement('button');
                        delBtn.textContent = 'Удалить';
                        delBtn.className = 'delete-comment-btn';
                        actions.appendChild(delBtn);

                        delBtn.onclick = async () => {
                            if (!confirm('Удалить комментарий?')) return;

                            await fetch(`/jump-group/comment/delete/${n.id}`, {
                                method: 'POST',
                                headers: {
                                    [csrfHeader]: csrfToken
                                }
                            });

                            location.reload();
                        };
                    }

                    parent.appendChild(el);

                    if (n.children.length) {
                        render(n.children, el.querySelector('.comment-children'));
                    }
                });
            }

            render(roots, rendered);

            // добавить корневой комментарий
            block.querySelector('.send-comment-btn').onclick = async () => {
                const input = block.querySelector('.add-comment input');
                const text = input.value.trim();
                if (!text) return;

                await fetch('/jump-group/comment/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type':'application/json',
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify({
                        groupId: Number(groupId),
                        replyCommentId: null,
                        content: text
                    })
                });

                location.reload();
            };
        });
    });
</script>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const leaveBtn = document.getElementById("leaveGroupBtn");
        const leaveForm = document.getElementById("leaveGroupForm");

        if (leaveBtn && leaveForm) {
            leaveBtn.addEventListener("click", async function (e) {
                e.preventDefault();

                const count = Number(this.dataset.count || 0);

                let message = "Вы уверены, что хотите выйти из группы?";

                if (count === 1) {
                    message = "Вы последний участник группы. Если выйдете, группа будет расформирована. Продолжить?";
                }

                if (!confirm(message)) return;

                const formData = new FormData(leaveForm);

                await fetch(leaveForm.action, {
                    method: "POST",
                    headers: {
                        [csrfHeader]: csrfToken
                    },
                    body: formData
                });

                window.location.href = "/jump-group";
            });
        }

    });
</script>
