<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>

    <title>SkyFriends — группы прыжков</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/find-group.css}">
</head>

<body>

<div th:replace="fragments/header :: site-header"></div>

<section class="hero-groups">
    <div>
        <h1>Группы прыжков</h1>
        <p>Найди команду, участвуй в прыжках и создавай свои группы</p>
    </div>
</section>

<div class="page-container">

    <!-- FILTERS -->
    <aside class="filters">
        <h5>Поиск групп</h5>

        <form method="get" action="/jump-group" class="d-flex flex-column gap-3">

            <div>
                <label>Место прыжка</label>

                <input type="text"
                       id="placeInput"
                       class="form-control"
                       placeholder="Введите место и Enter"/>

                <div id="placesContainer" class="d-flex flex-wrap gap-2 mt-2"></div>
            </div>

            <div>
                <label>Уровень подготовки</label>
                <select name="trainingLevel" class="form-select">
                    <option value="">Любой</option>
                    <th:block th:each="level : ${trainingLevels}">
                        <option th:value="${level.id}" th:text="${level.levelName}"></option>
                    </th:block>
                </select>
            </div>

            <div>
                <label>Дата от</label>
                <input type="datetime-local" name="jumpDateTimeStart" class="form-control"/>
            </div>

            <div>
                <label>Дата до</label>
                <input type="datetime-local" name="jumpDateTimeEnd" class="form-control"/>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       name="isParticipant"
                       value="true"
                       id="myGroups">
                <label class="form-check-label" for="myGroups">
                    Только мои группы
                </label>
            </div>

            <button class="btn btn-primary w-100">
                Найти
            </button>
        </form>

        <a th:href="@{/jump-group/create-group}"
           class="btn btn-success w-100 mt-3">
            + Создать группу
        </a>
    </aside>

    <!-- GROUPS -->
    <main class="d-flex flex-column gap-3">

        <div th:if="${#lists.isEmpty(groupsPage.content)}" class="empty">
            Группы не найдены
        </div>

        <div th:each="group : ${groupsPage.content}" class="group-card">

            <div class="group-head">
                <div class="group-title" th:text="${group.groupName}">
                    Название
                </div>

                <span class="badge-level"
                      th:text="'Уровень ' + ${group.trainingLevel}">
                </span>
            </div>

            <div class="text-muted" th:text="${group.description}">
                Описание
            </div>

            <div class="group-meta">
                <span>📍 <span th:text="${group.jumpPlace}"></span></span>
                <span>🕒
                    <span th:text="${#temporals.format(group.jumpDateTime,'dd MMM yyyy HH:mm')}"></span>
                </span>
                <span>👤 <strong th:text="${group.organizerInfo.username}"></strong></span>

                <span class="participants">
                    👥 <span th:text="${#lists.size(group.participants)}"></span>
                    / <span th:text="${group.maxParticipants}"></span>
                </span>

                <span th:if="${group.participantBool}" class="joined">
                    ✔ Вы участник
                </span>
            </div>

            <a th:href="@{'/jump-group/' + ${group.id}}"
               class="btn btn-outline-primary btn-sm align-self-start">
                Открыть
            </a>
        </div>

        <!-- PAGINATION -->
        <nav th:if="${groupsPage.totalPages > 1}">
            <ul class="pagination">

                <li class="page-item" th:classappend="${groupsPage.page == 0} ? ' disabled'">
                    <a class="page-link"
                       th:href="@{/jump-group(page=${groupsPage.page - 1})}">
                        Назад
                    </a>
                </li>

                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, groupsPage.totalPages - 1)}"
                    th:classappend="${i == groupsPage.page} ? ' active'">
                    <a class="page-link"
                       th:text="${i + 1}"
                       th:href="@{/jump-group(page=${i})}">
                    </a>
                </li>

                <li class="page-item"
                    th:classappend="${groupsPage.last} ? ' disabled'">
                    <a class="page-link"
                       th:href="@{/jump-group(page=${groupsPage.page + 1})}">
                        Вперёд
                    </a>
                </li>

            </ul>
        </nav>

    </main>
</div>

<div th:replace="fragments/footer :: site-footer"></div>

<script>
    const input = document.getElementById('placeInput');
    const container = document.getElementById('placesContainer');

    input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();

            const value = input.value.trim();
            if (!value) return;

            const badge = document.createElement('span');
            badge.className = 'badge bg-primary d-flex align-items-center gap-2';
            badge.innerHTML = `${value} <button type="button" class="btn-close btn-close-white btn-sm"></button>`;

            const hiddenInput = document.createElement('input');
            hiddenInput.type = 'hidden';
            hiddenInput.name = 'places';
            hiddenInput.value = value;

            badge.querySelector('button').addEventListener('click', function () {
                badge.remove();
                hiddenInput.remove();
            });

            container.appendChild(badge);
            container.appendChild(hiddenInput);

            input.value = '';
        }
    });
</script>

</body>
</html>
