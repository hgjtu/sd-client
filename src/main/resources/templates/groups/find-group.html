<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>

    <title>SkyFriends — группы прыжков</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:#f5f8fb;
            --card:#fff;
            --accent:#1fb6ff;
            --accent-2:#ff9f43;
            --muted:#6b7280;
            --radius:14px;
            --shadow:0 6px 18px rgba(22,28,37,0.08);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg,#eaf6ff 0%,#f5f8fb 60%);
            padding: 24px;
            color: #111827;
        }

        .container {
            max-width: 1300px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 22px;
        }

        /* LEFT FILTERS */
        .filters {
            position: sticky;
            top: 24px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px;
        }

        .filters h5 {
            margin-bottom: 14px;
        }

        .filters label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }

        /* GROUP CARD */
        .group-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .group-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .group-title {
            font-size: 18px;
            font-weight: 700;
        }

        .badge-level {
            background: #eef2ff;
            color: #3730a3;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 13px;
            font-weight: 600;
        }

        .group-meta {
            font-size: 14px;
            color: var(--muted);
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .participants {
            font-weight: 600;
        }

        .joined {
            color: #16a34a;
            font-weight: 600;
        }

        /* PAGINATION */
        .pagination {
            margin-top: 20px;
            justify-content: center;
        }

        @media (max-width: 1000px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<div th:replace="fragments/header :: site-header"></div>

<div class="container">

    <!-- LEFT: FILTERS -->
    <aside class="filters">
        <h5>Поиск групп ОН НЕ РАБОТАЕТ</h5>

        <form method="get" action="/jump-group" class="d-flex flex-column gap-3">

            <div>
                <label>Место прыжка</label>
                <input name="places"
                       class="form-control"
                       placeholder="Например: Коломна"/>
            </div>

            <div>
                <label>Уровень подготовки</label>
                <select name="trainingLevel" class="form-select">
                    <option value="">Любой</option>
                    <th:block th:each="level : ${trainingLevels}">
                        <option th:value="${level.id}" th:text="${level.levelName}"></option>
                    </th:block>
                </select>
            </div>

            <div>
                <label>Дата от</label>
                <input type="datetime-local" name="jumpDateTimeStart" class="form-control"/>
            </div>

            <div>
                <label>Дата до</label>
                <input type="datetime-local" name="jumpDateTimeEnd" class="form-control"/>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       name="isParticipant"
                       value="true"
                       id="myGroups">
                <label class="form-check-label" for="myGroups">
                    Только мои группы
                </label>
            </div>

            <button class="btn btn-primary w-100">
                Найти
            </button>
        </form>

        <a th:href="@{/jump-group/create-group}"
           class="btn btn-success w-100 mt-3">
            + Создать новую группу
        </a>
    </aside>

    <!-- CENTER: GROUPS -->
    <main class="d-flex flex-column gap-3">

        <div th:if="${#lists.isEmpty(groupsPage.content)}"
             class="text-center text-muted">
            Группы не найдены
        </div>

        <div th:each="group : ${groupsPage.content}"
             class="group-card">

            <div class="group-head">
                <div class="group-title"
                     th:text="${group.groupName}">
                    Название группы
                </div>

                <span class="badge-level"
                      th:text="'Уровень ' + ${group.trainingLevel}">
                    Уровень
                </span>
            </div>

            <div th:text="${group.description}"
                 class="text-muted">
                Описание группы
            </div>

            <div class="group-meta">
                <span>
                    📍 <span th:text="${group.jumpPlace}">Место</span>
                </span>
                <span>
                    🕒
                    <span th:text="${#temporals.format(group.jumpDateTime,'dd MMM yyyy HH:mm')}">
                        Дата
                    </span>
                </span>
                <span>
                    👤 Организатор:
                    <strong th:text="${group.organizerUsername}">user</strong>
                </span>
                <span class="participants">
                    👥
                    <span th:text="${#lists.size(group.participants)}"></span>
                    /
                    <span th:text="${group.maxParticipants}"></span>
                </span>
                <span th:if="${group.participantBool}" class="joined">
                    ✔ Вы участник
                </span>
            </div>

            <a th:href="@{'/jump-group/' + ${group.id}}"
               class="btn btn-outline-primary btn-sm align-self-start">
                Открыть группу
            </a>
        </div>

        <!-- PAGINATION -->
        <nav th:if="${groupsPage.totalPages > 1}">
            <ul class="pagination">

                <li class="page-item"
                    th:classappend="${groupsPage.page == 0} ? ' disabled'">
                    <a class="page-link"
                       th:href="@{/jump-group(page=${groupsPage.page - 1})}">
                        Назад
                    </a>
                </li>

                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, groupsPage.totalPages - 1)}"
                    th:classappend="${i == groupsPage.page} ? ' active'">
                    <a class="page-link"
                       th:text="${i + 1}"
                       th:href="@{/jump-group(page=${i})}">
                    </a>
                </li>

                <li class="page-item"
                    th:classappend="${groupsPage.last} ? ' disabled'">
                    <a class="page-link"
                       th:href="@{/jump-group(page=${groupsPage.page + 1})}">
                        Вперёд
                    </a>
                </li>

            </ul>
        </nav>

    </main>

</div>

<div th:replace="fragments/footer :: site-footer"></div>

</body>
</html>
