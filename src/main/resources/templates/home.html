<!-- templates/index.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Skydive Club — Прыжки с парашютом</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body class="profile-page">

<!-- Header -->
<div th:replace="fragments/header :: site-header"></div>

<main class="container py-5">

    <!-- HERO -->
    <section class="hero-home text-center">

        <div class="hero-badge mb-3">
            <i class="bi bi-cloud-fog2"></i>
            Skydive Club
        </div>

        <h1 class="hero-title">
            Прыжки с парашютом
        </h1>

        <p class="hero-subtitle">
            Свобода, высота и адреналин в каждом прыжке
        </p>

        <div class="mt-4 d-flex justify-content-center gap-3 flex-wrap">

            <a href="/jump-group" class="btn primary-btn">
                <i class="bi bi-people me-2"></i>
                Найти группу
            </a>

            <a href="/market" class="btn ghost-btn">
                <i class="bi bi-box-seam me-2"></i>
                Барахолка
            </a>

        </div>

    </section>

    <!-- INFO CARDS -->
    <section class="mt-5">

        <div class="row g-4">

            <div class="col-md-4">
                <div class="info-card">
                    <i class="bi bi-airplane"></i>
                    <h5>Прыжки</h5>
                    <p>Организованные прыжки с опытными инструкторами</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="info-card">
                    <i class="bi bi-journal-text"></i>
                    <h5>Логбук</h5>
                    <p>Веди историю своих прыжков и прогресс</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="info-card">
                    <i class="bi bi-chat-dots"></i>
                    <h5>Сообщество</h5>
                    <p>Общайся с другими парашютистами</p>
                </div>
            </div>

        </div>

    </section>

</main>

<!-- Footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
