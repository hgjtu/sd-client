<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смена пароля</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        .password-strength {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 min-h-screen">

<div class="container mx-auto px-4 py-12">
    <!-- Main Card -->
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden fade-in">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-purple-600 px-8 py-6">
            <div class="flex justify-center mb-4">
                <div class="bg-white/20 p-3 rounded-full">
                    <i class="fas fa-key text-white text-3xl"></i>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-white text-center">Смена пароля</h1>
            <p class="text-blue-100 text-center mt-2">Создайте надежный пароль для вашей учетной записи</p>
        </div>

        <!-- Form -->
        <div class="px-8 py-6">
            <form id="changePasswordForm" class="space-y-6">
                <!-- Current Password -->
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">
                        <i class="fas fa-lock mr-2 text-blue-500"></i>
                        Текущий пароль
                    </label>
                    <div class="relative">
                        <input type="password"
                               id="currentPassword"
                               name="currentPassword"
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all"
                               placeholder="Введите текущий пароль">
                        <button type="button" class="toggle-password absolute right-3 top-3 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message text-red-500 text-sm mt-1 hidden"></div>
                </div>

                <!-- New Password -->
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">
                        <i class="fas fa-shield-alt mr-2 text-blue-500"></i>
                        Новый пароль
                    </label>
                    <div class="relative">
                        <input type="password"
                               id="newPassword"
                               name="newPassword"
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all"
                               placeholder="Введите новый пароль">
                        <button type="button" class="toggle-password absolute right-3 top-3 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message text-red-500 text-sm mt-1 hidden"></div>

                    <!-- Password Strength Indicator -->
                    <div class="mt-3">
                        <div class="flex justify-between text-xs text-gray-600 mb-1">
                            <span>Надежность пароля:</span>
                            <span id="strengthText" class="font-semibold">Слабый</span>
                        </div>
                        <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                            <div id="strengthBar" class="h-full w-0 transition-all duration-300 rounded-full"></div>
                        </div>
                        <div class="mt-2 text-xs text-gray-500 space-y-1">
                            <div id="lengthCheck" class="flex items-center">
                                <i class="fas fa-circle text-[8px] mr-2"></i>
                                <span>Минимум 8 символов</span>
                            </div>
                            <div id="upperCheck" class="flex items-center">
                                <i class="fas fa-circle text-[8px] mr-2"></i>
                                <span>Заглавная буква (A-Z)</span>
                            </div>
                            <div id="lowerCheck" class="flex items-center">
                                <i class="fas fa-circle text-[8px] mr-2"></i>
                                <span>Строчная буква (a-z)</span>
                            </div>
                            <div id="digitCheck" class="flex items-center">
                                <i class="fas fa-circle text-[8px] mr-2"></i>
                                <span>Цифра (0-9)</span>
                            </div>
                            <div id="specialCheck" class="flex items-center">
                                <i class="fas fa-circle text-[8px] mr-2"></i>
                                <span>Специальный символ (@#$%^&+=)</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">
                        <i class="fas fa-check-circle mr-2 text-blue-500"></i>
                        Подтверждение пароля
                    </label>
                    <div class="relative">
                        <input type="password"
                               id="confirmPassword"
                               name="confirmPassword"
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all"
                               placeholder="Повторите новый пароль">
                        <button type="button" class="toggle-password absolute right-3 top-3 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message text-red-500 text-sm mt-1 hidden"></div>
                    <div id="matchMessage" class="text-sm mt-1 hidden"></div>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                        id="submitBtn"
                        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-3 px-4 rounded-lg hover:from-blue-700 hover:to-purple-700 transform hover:scale-105 transition-all duration-200 shadow-lg">
                    <i class="fas fa-save mr-2"></i>
                    Сменить пароль
                </button>
            </form>

            <!-- Back to Dashboard Link -->
            <div class="mt-6 text-center">
                <a href="/dashboard" class="text-blue-600 hover:text-blue-800 transition-colors">
                    <i class="fas fa-arrow-left mr-1"></i>
                    Вернуться на главную
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute("content");
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute("content");

    // Toggle password visibility
    document.querySelectorAll('.toggle-password').forEach(button => {
        button.addEventListener('click', function() {
            const input = this.parentElement.querySelector('input');
            const icon = this.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    });

    // Password strength checker
    const newPasswordInput = document.getElementById('newPassword');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');

    const checks = {
        length: false,
        upper: false,
        lower: false,
        digit: false,
        special: false
    };

    function updatePasswordStrength() {
        const password = newPasswordInput.value;

        checks.length = password.length >= 8;
        checks.upper = /[A-Z]/.test(password);
        checks.lower = /[a-z]/.test(password);
        checks.digit = /[0-9]/.test(password);
        checks.special = /[@#$%^&+=]/.test(password);

        // Update UI
        updateCheckIcon('lengthCheck', checks.length);
        updateCheckIcon('upperCheck', checks.upper);
        updateCheckIcon('lowerCheck', checks.lower);
        updateCheckIcon('digitCheck', checks.digit);
        updateCheckIcon('specialCheck', checks.special);

        const strength = Object.values(checks).filter(v => v === true).length;

        let width = 0;
        let color = '';
        let text = '';

        if (strength <= 2) {
            width = 20;
            color = 'bg-red-500';
            text = 'Очень слабый';
        } else if (strength === 3) {
            width = 40;
            color = 'bg-orange-500';
            text = 'Слабый';
        } else if (strength === 4) {
            width = 70;
            color = 'bg-yellow-500';
            text = 'Средний';
        } else if (strength === 5) {
            width = 100;
            color = 'bg-green-500';
            text = 'Сильный';
        }

        strengthBar.className = `h-full transition-all duration-300 rounded-full ${color}`;
        strengthBar.style.width = `${width}%`;
        strengthText.textContent = text;
        strengthText.className = `font-semibold ${color.replace('bg-', 'text-')}`;
    }

    function updateCheckIcon(elementId, isValid) {
        const element = document.getElementById(elementId);
        if (!element) return; // Добавлена проверка на существование элемента

        const icon = element.querySelector('i');
        const text = element.querySelector('span');

        if (!icon || !text) return; // Добавлена проверка

        if (isValid) {
            icon.className = 'fas fa-check-circle text-green-500 text-xs mr-2';
            text.className = 'text-green-600';
        } else {
            icon.className = 'fas fa-circle text-gray-300 text-[8px] mr-2';
            text.className = 'text-gray-500';
        }
    }

    newPasswordInput.addEventListener('input', updatePasswordStrength);

    // Password match checker
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const matchMessage = document.getElementById('matchMessage');

    function checkPasswordMatch() {
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (confirmPassword.length === 0) {
            matchMessage.className = 'text-sm mt-1 hidden';
            return;
        }

        if (newPassword === confirmPassword) {
            matchMessage.className = 'text-sm mt-1 text-green-600';
            matchMessage.innerHTML = '<i class="fas fa-check-circle mr-1"></i> Пароли совпадают';
        } else {
            matchMessage.className = 'text-sm mt-1 text-red-600';
            matchMessage.innerHTML = '<i class="fas fa-times-circle mr-1"></i> Пароли не совпадают';
        }
    }

    newPasswordInput.addEventListener('input', checkPasswordMatch);
    confirmPasswordInput.addEventListener('input', checkPasswordMatch);

    // Form submission
    const form = document.getElementById('changePasswordForm');
    const submitBtn = document.getElementById('submitBtn');

    // Исправленные функции showError и clearError
    function showError(inputId, message) {
        const inputElement = document.getElementById(inputId);
        if (!inputElement) return;

        // Находим контейнер ошибки (родительский div -> .error-message)
        const parentDiv = inputElement.closest('div');
        const errorDiv = parentDiv.querySelector('.error-message');

        if (errorDiv) {
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
        }
        inputElement.classList.add('border-red-500');
    }

    function clearError(inputId) {
        const inputElement = document.getElementById(inputId);
        if (!inputElement) return;

        const parentDiv = inputElement.closest('div');
        const errorDiv = parentDiv.querySelector('.error-message');

        if (errorDiv) {
            errorDiv.classList.add('hidden');
        }
        inputElement.classList.remove('border-red-500');
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Clear previous errors
        ['currentPassword', 'newPassword', 'confirmPassword'].forEach(clearError);

        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        // Validation
        let hasError = false;

        if (!currentPassword) {
            showError('currentPassword', 'Текущий пароль обязателен');
            hasError = true;
        }

        if (!newPassword) {
            showError('newPassword', 'Новый пароль обязателен');
            hasError = true;
        } else if (!checks.length || !checks.upper || !checks.lower || !checks.digit || !checks.special) {
            showError('newPassword', 'Пароль не соответствует требованиям безопасности');
            hasError = true;
        }

        if (!confirmPassword) {
            showError('confirmPassword', 'Подтверждение пароля обязательно');
            hasError = true;
        } else if (newPassword !== confirmPassword) {
            showError('confirmPassword', 'Пароли не совпадают');
            hasError = true;
        }

        if (hasError) return;

        // Show loading state
        submitBtn.disabled = true;
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Отправка...';

        try {
            const response = await fetch('/change-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken,
                },
                body: JSON.stringify({
                    currentPassword: currentPassword,
                    newPassword: newPassword,
                    confirmPassword: confirmPassword
                })
            });

            if (response.ok) {
                Swal.fire({
                    icon: 'success',
                    title: 'Успешно!',
                    text: 'Пароль успешно изменен',
                    confirmButtonColor: '#3B82F6',
                    background: '#ffffff',
                    iconColor: '#10B981'
                }).then(() => {
                    form.reset();
                    updatePasswordStrength();
                    checkPasswordMatch();
                    window.location.href = '/profile';
                });
            } else if (response.status === 404) {
                Swal.fire({
                    icon: 'error',
                    title: 'Ошибка',
                    text: 'Пользователь не найден',
                    confirmButtonColor: '#3B82F6'
                });
            } else {
                const errorData = await response.text();
                Swal.fire({
                    icon: 'error',
                    title: 'Ошибка',
                    text: errorData || 'Не удалось изменить пароль. Проверьте правильность текущего пароля.',
                    confirmButtonColor: '#3B82F6'
                });
            }
        } catch (error) {
            Swal.fire({
                icon: 'error',
                title: 'Ошибка соединения',
                text: 'Проверьте подключение к серверу',
                confirmButtonColor: '#3B82F6'
            });
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    });

    // Initialize password strength on page load
    updatePasswordStrength();
</script>
</body>
</html>
