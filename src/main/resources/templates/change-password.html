<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смена пароля</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Общий стиль сайта -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <!-- Стиль страницы -->
    <link rel="stylesheet" th:href="@{/css/change-password.css}">

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="profile-page">

<!-- Header -->
<div th:replace="fragments/header :: site-header"></div>

<main class="container py-4">

    <!-- Верхняя плашка -->
    <section class="hero-profile">
        <h1>Безопасность</h1>
        <p>Смена пароля</p>
    </section>

    <!-- Карточка -->
    <div class="card border-0 shadow-lg password-card">

        <!-- Header -->
        <div class="card-header password-header">
            <h5 class="mb-0">
                <i class="bi bi-shield-lock me-2"></i>
                Обновление пароля
            </h5>
        </div>

        <!-- Body -->
        <div class="card-body p-4 p-lg-5">

            <form id="changePasswordForm">

                <!-- Current -->
                <div class="mb-4">
                    <label class="form-label modern-label">
                        Текущий пароль
                    </label>

                    <div class="password-wrap">
                        <input type="password"
                               id="currentPassword"
                               name="currentPassword"
                               class="form-control modern-input"
                               placeholder="Введите текущий пароль">

                        <button type="button"
                                class="toggle-password pass-eye">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <div class="error-message small text-danger mt-2 d-none"></div>
                </div>

                <!-- New -->
                <div class="mb-4">
                    <label class="form-label modern-label">
                        Новый пароль
                    </label>

                    <div class="password-wrap">
                        <input type="password"
                               id="newPassword"
                               name="newPassword"
                               class="form-control modern-input"
                               placeholder="Введите новый пароль">

                        <button type="button"
                                class="toggle-password pass-eye">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <div class="error-message small text-danger mt-2 d-none"></div>

                    <!-- Strength -->
                    <div class="strength-box mt-3">

                        <div class="d-flex justify-content-between mb-2 small">
                            <span>Надежность пароля</span>
                            <strong id="strengthText">Слабый</strong>
                        </div>

                        <div class="strength-track">
                            <div id="strengthBar"></div>
                        </div>

                        <div class="rules-list mt-3">

                            <div id="lengthCheck"><i class="bi bi-circle-fill"></i><span>Минимум 8 символов</span></div>
                            <div id="upperCheck"><i class="bi bi-circle-fill"></i><span>Заглавная буква</span></div>
                            <div id="lowerCheck"><i class="bi bi-circle-fill"></i><span>Строчная буква</span></div>
                            <div id="digitCheck"><i class="bi bi-circle-fill"></i><span>Цифра</span></div>
                            <div id="specialCheck"><i class="bi bi-circle-fill"></i><span>Спецсимвол</span></div>

                        </div>
                    </div>
                </div>

                <!-- Confirm -->
                <div class="mb-4">
                    <label class="form-label modern-label">
                        Подтверждение пароля
                    </label>

                    <div class="password-wrap">
                        <input type="password"
                               id="confirmPassword"
                               name="confirmPassword"
                               class="form-control modern-input"
                               placeholder="Повторите новый пароль">

                        <button type="button"
                                class="toggle-password pass-eye">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <div class="error-message small text-danger mt-2 d-none"></div>
                    <div id="matchMessage" class="small mt-2 d-none"></div>
                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-between flex-wrap gap-3 pt-2">

                    <a href="/profile" class="btn cancel-btn">
                        <i class="bi bi-arrow-left me-2"></i>
                        Назад
                    </a>

                    <button type="submit"
                            id="submitBtn"
                            class="btn save-btn">

                        <i class="bi bi-check-circle me-2"></i>
                        Сменить пароль
                    </button>

                </div>

            </form>

        </div>
    </div>

</main>

<!-- Footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS ОСТАВЛЕН ПО ЛОГИКЕ ПРЕЖНИМ -->
<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute("content");
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute("content");

    /* toggle password */
    document.querySelectorAll('.toggle-password').forEach(button => {
        button.addEventListener('click', function () {
            const input = this.parentElement.querySelector('input');
            const icon = this.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        });
    });

    /* strength */
    const newPasswordInput = document.getElementById('newPassword');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');

    const checks = {
        length:false, upper:false, lower:false, digit:false, special:false
    };

    function updatePasswordStrength(){
        const password = newPasswordInput.value;

        checks.length = password.length >= 8;
        checks.upper = /[A-Z]/.test(password);
        checks.lower = /[a-z]/.test(password);
        checks.digit = /[0-9]/.test(password);
        checks.special = /[@#$%^&+=]/.test(password);

        updateCheckIcon('lengthCheck', checks.length);
        updateCheckIcon('upperCheck', checks.upper);
        updateCheckIcon('lowerCheck', checks.lower);
        updateCheckIcon('digitCheck', checks.digit);
        updateCheckIcon('specialCheck', checks.special);

        const strength = Object.values(checks).filter(v => v).length;

        let width = '0%';
        let color = '#ef4444';
        let text = 'Слабый';

        if (strength <= 2){
            width='20%'; color='#ef4444'; text='Очень слабый';
        }else if(strength === 3){
            width='45%'; color='#f59e0b'; text='Слабый';
        }else if(strength === 4){
            width='75%'; color='#38bdf8'; text='Средний';
        }else if(strength === 5){
            width='100%'; color='#22c55e'; text='Сильный';
        }

        strengthBar.style.width = width;
        strengthBar.style.background = color;
        strengthText.textContent = text;
        strengthText.style.color = color;
    }

    function updateCheckIcon(id, valid){
        const el = document.getElementById(id);
        const icon = el.querySelector('i');
        const text = el.querySelector('span');

        if(valid){
            icon.className = 'bi bi-check-circle-fill';
            icon.style.color = '#22c55e';
            text.style.color = '#16a34a';
        }else{
            icon.className = 'bi bi-circle-fill';
            icon.style.color = '#cbd5e1';
            text.style.color = '#64748b';
        }
    }

    newPasswordInput.addEventListener('input', updatePasswordStrength);

    /* confirm */
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const matchMessage = document.getElementById('matchMessage');

    function checkPasswordMatch(){
        const p1 = newPasswordInput.value;
        const p2 = confirmPasswordInput.value;

        if(p2.length === 0){
            matchMessage.className = 'small mt-2 d-none';
            return;
        }

        if(p1 === p2){
            matchMessage.className = 'small mt-2 text-success';
            matchMessage.innerHTML = 'Пароли совпадают';
        }else{
            matchMessage.className = 'small mt-2 text-danger';
            matchMessage.innerHTML = 'Пароли не совпадают';
        }
    }

    newPasswordInput.addEventListener('input', checkPasswordMatch);
    confirmPasswordInput.addEventListener('input', checkPasswordMatch);

    /* submit */
    const form = document.getElementById('changePasswordForm');
    const submitBtn = document.getElementById('submitBtn');

    function showError(inputId, message){
        const input = document.getElementById(inputId);
        const errorDiv = input.parentElement.parentElement.querySelector('.error-message');

        errorDiv.textContent = message;
        errorDiv.classList.remove('d-none');
        input.classList.add('is-invalid');
    }

    function clearError(inputId){
        const input = document.getElementById(inputId);
        const errorDiv = input.parentElement.parentElement.querySelector('.error-message');

        errorDiv.classList.add('d-none');
        input.classList.remove('is-invalid');
    }

    form.addEventListener('submit', async (e)=>{
        e.preventDefault();

        ['currentPassword','newPassword','confirmPassword'].forEach(clearError);

        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        let hasError = false;

        if(!currentPassword){
            showError('currentPassword','Введите текущий пароль');
            hasError = true;
        }

        if(!newPassword){
            showError('newPassword','Введите новый пароль');
            hasError = true;
        }else if(!checks.length || !checks.upper || !checks.lower || !checks.digit || !checks.special){
            showError('newPassword','Пароль не соответствует требованиям');
            hasError = true;
        }

        if(!confirmPassword){
            showError('confirmPassword','Подтвердите пароль');
            hasError = true;
        }else if(newPassword !== confirmPassword){
            showError('confirmPassword','Пароли не совпадают');
            hasError = true;
        }

        if(hasError) return;

        submitBtn.disabled = true;
        const original = submitBtn.innerHTML;
        submitBtn.innerHTML = 'Сохранение...';

        try{
            const response = await fetch('/change-password',{
                method:'POST',
                headers:{
                    'Content-Type':'application/json',
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify({
                    currentPassword,
                    newPassword,
                    confirmPassword
                })
            });

            if(response.ok){
                Swal.fire({
                    icon:'success',
                    title:'Успешно',
                    text:'Пароль изменён',
                    confirmButtonColor:'#38bdf8'
                }).then(()=>{
                    window.location.href='/profile';
                });
            }else{
                const errorText = await response.text();

                Swal.fire({
                    icon:'error',
                    title:'Ошибка',
                    text:errorText || 'Не удалось изменить пароль',
                    confirmButtonColor:'#38bdf8'
                });
            }

        }catch(err){
            Swal.fire({
                icon:'error',
                title:'Ошибка соединения',
                text:'Проверьте подключение',
                confirmButtonColor:'#38bdf8'
            });
        }finally{
            submitBtn.disabled = false;
            submitBtn.innerHTML = original;
        }
    });

    updatePasswordStrength();
</script>

</body>
</html>
