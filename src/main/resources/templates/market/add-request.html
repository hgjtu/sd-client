<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${item != null} ? 'Редактировать запрос' : 'Создать запрос на товар'">Создать запрос</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 25px;
            background: #fff;
            border-radius: 0.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<!-- Подключаем header -->
<div th:replace="fragments/header :: site-header"></div>

<div class="container">
    <div class="form-container">
        <h2 class="mb-4" th:text="${item != null} ? 'Редактировать запрос' : 'Создать запрос на товар'">Создать запрос</h2>

        <!-- Сообщение об ошибке -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <!-- Форма -->
        <form id="itemForm"
              th:action="@{${actionUrl}}"
              method="post">
            <!-- Название -->
            <div class="mb-3">
                <label for="title" class="form-label">Название товара</label>
                <input type="text" class="form-control" id="title" name="title"
                       th:value="${item != null} ? ${item.title} : ''"
                       placeholder="Введите название" required>
            </div>

            <!-- Категория -->
            <div class="mb-3">
                <label for="categoryId" class="form-label">Категория</label>
                <select class="form-select" id="categoryId" name="categoryId" required>
                    <option value="" disabled th:selected="${item == null}">Выберите категорию</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.nameRu}"
                            th:selected="${item != null} ? ${item.categoryId} == ${category.id} : false">
                    </option>
                </select>
            </div>

            <!-- Описание -->
            <div class="mb-3">
                <label for="description" class="form-label">Описание</label>
                <textarea class="form-control" id="description" name="description" rows="4"
                          placeholder="Введите описание" required
                          th:text="${item != null} ? ${item.description} : ''"></textarea>
            </div>

            <!-- Местоположение -->
            <div class="mb-3">
                <label for="location" class="form-label">Местоположение</label>
                <input type="text" class="form-control" id="location" name="location"
                       placeholder="Введите город или адрес" required
                       th:value="${item != null} ? ${item.location} : ''">
            </div>

            <!-- Фото -->
            <div class="mb-3">
                <label class="form-label">Фотографии (до 10)</label>
                <input type="file"
                       class="form-control"
                       id="photoInput"
                       accept="image/*"
                       multiple>

                <div id="previewContainer" class="d-flex flex-wrap gap-2 mt-3">

                    <th:block th:if="${item != null && !item.medias.isEmpty()}">
                        <div th:each="media : ${item.medias}"
                             class="position-relative"
                             th:attr="data-media-id=${media.id}, data-url=${media.uploadUrl}">

                            <img th:src="${media.uploadUrl}"
                                 style="width:120px;height:120px;object-fit:cover"
                                 class="rounded border"
                                 th:alt="${media.uploadUrl}"/>

                            <button type="button"
                                    class="btn btn-sm btn-danger position-absolute top-0 end-0"
                                    th:attr="onclick=|deleteExistingMedia('${media.id}', this)|">
                                &times;
                            </button>
                        </div>
                    </th:block>

                </div>
            </div>

            <!-- Кнопки -->
            <button type="submit" class="btn btn-primary"
                    th:text="${item != null} ? 'Сохранить изменения' : 'Создать запрос'">
                Создать запрос
            </button>
            <a href="javascript:history.back()" class="btn btn-secondary ms-2">Отмена</a>
        </form>
    </div>
</div>

<!-- Подключаем footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute("content");
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute("content");

    const form = document.getElementById("itemForm");
    const photoInput = document.getElementById("photoInput");
    const previewContainer = document.getElementById("previewContainer");

    const MAX_FILES = 10;
    let pendingFiles = [];
    
    let itemId = "[[${item != null ? item.id : ''}]]";
    if (itemId) {
        itemId = parseInt(itemId);
    } else {
        itemId = null;
    }

    /* ================================
       📸 Выбор файлов
    ================================ */
    photoInput?.addEventListener("change", function (event) {
        const files = Array.from(event.target.files);

        files.forEach((file, index) => {
            console.log(`Файл ${index}:`, {
                name: file.name,
                size: file.size,
                type: file.type,
                lastModified: new Date(file.lastModified)
            });
        });

        if (pendingFiles.length + files.length > MAX_FILES) {
            alert("Можно загрузить максимум 10 фотографий");
            return;
        }

        for (const file of files) {
            if (!file.type.startsWith("image/")) {
                alert("Можно загружать только изображения");
                continue;
            }

            if (file.size > 5 * 1024 * 1024) {
                alert("Максимальный размер файла — 5MB");
                continue;
            }

            // Добавляем файл в массив
            pendingFiles.push(file);

            // Создаём preview
            const reader = new FileReader();
            reader.onload = function (e) {
                createPreview(e.target.result, file);
            };
            reader.readAsDataURL(file);
        }

        // Очищаем input
        photoInput.value = "";
    });

    /* ================================
       🚀 СОХРАНЕНИЕ
    ================================ */
    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const formData = new FormData(form);
        const itemData = Object.fromEntries(formData.entries());
        delete itemData._csrf;

        console.log(itemData); // ПРОВЕРЬ ЧТО ТУТ

        const saveResponse = await fetch(form.action, {
            method: form.method || "POST",
            headers: {
                "Content-Type": "application/json",
                [csrfHeader]: csrfToken
            },
            body: JSON.stringify(itemData)
        });

        if (!saveResponse.ok) {
            alert("Ошибка сохранения");
            return;
        }

        itemId = await saveResponse.text();

        await uploadAllPhotos();

        window.location.href = "/market/item/" + itemId;
    });

    /* ================================
       ☁️ Загрузка всех фото
    ================================ */
    async function uploadAllPhotos() {

        for (const file of pendingFiles) {

            // Получаем presigned URL
            const uploadResponse = await fetch("/media/MARKET/upload-url/item/" + itemId.toString(), {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify({
                    fileName: file.name,
                    contentType: file.type
                })
            });

            if (!uploadResponse.ok) throw new Error("Ошибка получения upload-url");

            const uploadData = await uploadResponse.json();
            const uploadUrl = uploadData.uploadUrl;
            const mediaId = uploadData.id;

            // Загружаем в S3 / MinIO
            const s3Response = await fetch(uploadUrl, {
                method: "PUT",
                body: file
            });

            if (!s3Response.ok) throw new Error("Ошибка загрузки в S3");

            // Подтверждаем загрузку
            const completeResponse = await fetch(`/media/MARKET/complete/${mediaId}`, {
                method: "POST",
                headers: {[csrfHeader]: csrfToken}
            });

            if (completeResponse.ok) {
                // Привязываем к item
                await fetch(`/market/items/add-media/${itemId}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify([mediaId])
                });
            }
            else throw new Error("Ошибка подтверждения");
        }

        pendingFiles = [];
    }

    /* ================================
       🖼 Предпросмотр
    ================================ */
    function createPreview(src, file) {
        const wrapper = document.createElement("div");
        wrapper.className = "position-relative";
        wrapper.dataset.filename = file.name;

        const img = document.createElement("img");
        img.src = src;
        img.style.width = "120px";
        img.style.height = "120px";
        img.style.objectFit = "cover";
        img.className = "rounded border";

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.innerHTML = "&times;";
        removeBtn.className = "btn btn-sm btn-danger position-absolute top-0 end-0";
        removeBtn.onclick = () => {
            pendingFiles = pendingFiles.filter(f => f !== file);
            wrapper.remove();
            console.log('Удалён файл:', file.name);
        };

        wrapper.appendChild(img);
        wrapper.appendChild(removeBtn);
        previewContainer.appendChild(wrapper);
    }

    /* ================================
       🗑 Удаление существующих
    ================================ */
    async function deleteExistingMedia(mediaId, button) {
        if (confirm('Удалить фото?')) {
            const deleteMediaResponse = await fetch(`/market/items/delete-media/${itemId}/${mediaId}`, {
                method: "DELETE",
                headers: {
                    [csrfHeader]: csrfToken
                },
            });

            if(deleteMediaResponse.ok){
                button.closest('.position-relative').remove();
            }
            else{
                alert("Ошибка удаления");
            }
        }
    }
</script>
</body>
</html>
