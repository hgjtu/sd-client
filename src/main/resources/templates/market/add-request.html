<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Создать запрос на товар</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 25px;
            background: #fff;
            border-radius: 0.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<!-- Подключаем header -->
<div th:replace="fragments/header :: site-header"></div>

<div class="container">
    <div class="form-container">
        <h2 class="mb-4">Создать запрос на товар</h2>

        <!-- Сообщение об ошибке, если есть -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/market/add-request}" method="post">
            <!-- Название -->
            <div class="mb-3">
                <label for="title" class="form-label">Название товара</label>
                <input type="text" class="form-control" id="title" name="title" placeholder="Введите название" required>
            </div>

            <!-- Категория -->
            <div class="mb-3">
                <label for="categoryId" class="form-label">Категория</label>
                <select class="form-select" id="categoryId" name="categoryId" required>
                    <option value="" disabled selected>Выберите категорию</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.nameRu}">
                    </option>
                </select>
            </div>

            <!-- Описание -->
            <div class="mb-3">
                <label for="description" class="form-label">Описание</label>
                <textarea class="form-control" id="description" name="description" rows="4" placeholder="Опишите, что вы ищете" required></textarea>
            </div>

            <!-- Ссылки на изображения -->
            <div class="mb-3">
                <label for="imagesUrls" class="form-label">Ссылки на изображения (через запятую, если есть)</label>
                <input type="text" class="form-control" id="imagesUrls" name="imagesUrls" placeholder="https://example.com/img1.jpg, https://example.com/img2.jpg">
            </div>

            <!-- Местоположение -->
            <div class="mb-3">
                <label for="location" class="form-label">Местоположение</label>
                <input type="text" class="form-control" id="location" name="location" placeholder="Введите город или адрес" required>
            </div>

            <button type="submit" class="btn btn-primary">Создать запрос</button>
            <a href="/market" class="btn btn-secondary ms-2">Отмена</a>
        </form>
    </div>
</div>

<!-- Подключаем footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
