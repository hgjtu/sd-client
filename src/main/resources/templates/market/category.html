<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'Категория: ' + ${categoryName}">Категория</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Общие стили -->
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <!-- Стили страницы -->
    <link rel="stylesheet" th:href="@{/css/market-category.css}">
</head>

<body class="market-category-page">

<!-- Header -->
<div th:replace="fragments/header :: site-header"></div>

<main class="container py-5">

    <!-- BACK -->
    <a href="/market" class="back-link-modern">
        <i class="bi bi-arrow-left me-2"></i>Назад к категориям
    </a>

    <!-- HERO -->
    <section class="hero-category">

        <div>
            <h1 th:text="${categoryName}">Категория</h1>
            <p th:text="${categoryDescription}">Описание категории</p>
        </div>

    </section>

    <!-- PANEL -->
    <section class="market-panel">

        <div class="market-toolbar">

            <!-- LEFT -->
            <div class="mode-wrap">

                <div class="text-muted fw-semibold">Режим:</div>

                <div class="btn-group btn-group-sm" role="group">

                    <input type="radio"
                           class="btn-check"
                           name="mode"
                           id="mode-buy"
                           autocomplete="off"
                           th:checked="${mode == 'buy'}">

                    <label class="btn btn-outline-primary mode-pill"
                           for="mode-buy"
                           data-mode="buy">
                        <i class="bi bi-cart me-2"></i>Купить
                    </label>

                    <input type="radio"
                           class="btn-check"
                           name="mode"
                           id="mode-sell"
                           autocomplete="off"
                           th:checked="${mode == 'sell'}">

                    <label class="btn btn-outline-danger mode-pill"
                           for="mode-sell"
                           data-mode="sell">
                        <i class="bi bi-cash-stack me-2"></i>Продать
                    </label>

                </div>

            </div>

            <!-- RIGHT -->
            <div class="actions-wrap">

                <a href="/market/add-item" class="btn btn-success modern-btn">
                    <i class="bi bi-plus-circle me-2"></i>Добавить товар
                </a>

                <a href="/market/add-request" class="btn btn-warning modern-btn text-dark">
                    <i class="bi bi-pencil-square me-2"></i>Создать заявку
                </a>

                <a href="/market/my-items" class="btn btn-outline-secondary modern-btn">
                    <i class="bi bi-box-seam me-2"></i>Мои товары и заявки
                </a>

            </div>

        </div>

    </section>

    <!-- ERROR -->
    <div th:if="${error}" class="alert alert-danger mb-4" th:text="${error}"></div>

    <!-- ITEMS -->
    <div class="row g-4">

        <div class="col-12 col-md-6 col-lg-4"
             th:each="item : ${items}">

            <div class="card item-card h-100"
                 th:data-id="${item.id}"
                 th:data-mode="${mode}">

                <img class="item-img"
                     th:src="${item.mainImageUrl != null} ? ${item.mainImageUrl} : '/default-item.png'"
                     th:onerror="this.onerror=null; this.src='/default-item.png'"
                     th:alt="${item.title}">

                <div class="card-body">

                    <h5 class="card-title mb-2"
                        th:text="${item.title}">
                        Название товара
                    </h5>

                    <p class="price-text mb-0"
                       th:text="${item.price} + ' ₽'">
                        Цена
                    </p>

                </div>

            </div>

        </div>

        <!-- EMPTY -->
        <div class="col-12"
             th:if="${#lists.isEmpty(items)}">

            <div class="empty-box">
                Нет объявлений в этой категории.
            </div>

        </div>

    </div>

</main>

<!-- Footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS НЕ ИЗМЕНЕН -->
<script>
    (function() {
        let currentMode = new URLSearchParams(window.location.search).get("mode") || "buy";

        const modeButtons = document.querySelectorAll('.mode-pill');

        modeButtons.forEach(btn => {
            if (btn.dataset.mode === currentMode) {
                btn.classList.add('active');
            }

            btn.addEventListener('click', () => {
                currentMode = btn.dataset.mode;
                const url = new URL(window.location.href);
                url.searchParams.set('mode', currentMode);
                window.location.href = url.toString();
            });
        });

        document.querySelectorAll('.item-card').forEach(card => {
            card.addEventListener('click', () => {
                const id = card.dataset.id;
                window.location.href = `/market/item/${id}`;
            });
        });
    })();
</script>

</body>
</html>
