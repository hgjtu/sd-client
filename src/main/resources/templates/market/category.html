<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'Категория: ' + ${categoryName}">Категория</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .item-card {
            cursor: pointer;
            transition: transform .15s ease, box-shadow .15s ease;
        }
        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .item-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-top-left-radius: .5rem;
            border-top-right-radius: .5rem;
        }
        .mode-pill {
            min-width: 110px;
        }
    </style>
</head>
<body>

<!-- Подключаем header -->
<div th:replace="fragments/header :: site-header"></div>

<div class="container py-4">

    <!-- Заголовок и тоггл -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
        <div>
            <h1 class="h4 mb-1" th:text="${categoryName}">Категория</h1>
            <p class="text-muted mb-0" th:text="${categoryDescription}">Описание категории</p>
        </div>

        <div class="d-flex align-items-center gap-3">
            <div class="text-muted small">Режим:</div>
            <div class="btn-group btn-group-sm" role="group">
                <input type="radio" class="btn-check" name="mode" id="mode-buy" autocomplete="off"
                       th:checked="${mode == 'buy'}">
                <label class="btn btn-outline-primary mode-pill" for="mode-buy" data-mode="buy">Купить</label>

                <input type="radio" class="btn-check" name="mode" id="mode-sell" autocomplete="off"
                       th:checked="${mode == 'sell'}">
                <label class="btn btn-outline-danger mode-pill" for="mode-sell" data-mode="sell">Продать</label>
            </div>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Сетка товаров -->
    <div class="row g-4">
        <div class="col-12 col-md-6 col-lg-4" th:each="item : ${items}">
            <div class="card item-card h-100"
                 th:data-id="${item.id}"
                 th:onclick="'window.location.href=\'/item/' + ${item.id} + '?mode=' + ${mode} + '\';'">
                <img th:src="${item.mainImageUrl}" class="item-img" th:alt="${item.title}">
                <div class="card-body">
                    <h5 class="card-title mb-1" th:text="${item.title}">Название товара</h5>
                    <p class="card-text text-muted small mb-0" th:text="${item.price} + ' ₽'">Цена</p>
                </div>
            </div>
        </div>

        <!-- Если товаров нет -->
        <div class="col-12 text-center text-muted py-5" th:if="${#lists.isEmpty(items)}">
            Нет объявлений в этой категории.
        </div>
    </div>

</div>

<!-- Подключаем footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    (function() {
        let currentMode = new URLSearchParams(window.location.search).get("mode") || "buy";

        // Обновляем активное состояние кнопок
        const modeButtons = document.querySelectorAll('.mode-pill');
        modeButtons.forEach(btn => {
            if (btn.dataset.mode === currentMode) {
                btn.classList.add('active');
            }
            btn.addEventListener('click', () => {
                currentMode = btn.dataset.mode;
                const url = new URL(window.location.href);
                url.searchParams.set('mode', currentMode);
                window.location.href = url.toString();
            });
        });
    })();
</script>
</body>
</html>
