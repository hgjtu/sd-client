<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${item.title}">Товар</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">

    <style>
        :root {
            --bg:#f5f8fb;
            --card:#fff;
            --accent:#1fb6ff;
            --accent-2:#ff9f43;
            --muted:#6b7280;
            --radius:14px;
            --shadow:0 6px 18px rgba(22,28,37,0.08);
        }

        body {
            margin:0;
            font-family:'Inter',system-ui,sans-serif;
            background:linear-gradient(180deg,#eaf6ff 0%,#f5f8fb 60%);
            color:#111827;
            padding:24px;
        }

        .media img {
            max-width:100%;
            border-radius:10px;
            box-shadow:0 3px 12px rgba(0,0,0,0.08);
            margin-top:8px;
        }

        .comments {
            margin-top:24px;
            background:#f9fafb;
            border-radius:10px;
            padding:14px 16px;
        }

        .comments h4 {
            margin-bottom:12px;
            font-size:17px;
            color:#0f172a;
        }

        .comment {
            border-bottom:1px solid #e5e7eb;
            padding:8px 0;
        }
        .comment:last-child {border:0;}
        .comment strong {font-size:14px;color:#111827;}
        .comment p {margin:4px 0;font-size:14px;color:#374151;}
        .comment div {font-size:12px;color:var(--muted);}

        .add-comment {
            display:flex;
            gap:8px;
            margin-top:10px;
        }

        .add-comment input {
            flex:1;
            border:1px solid #d1d5db;
            border-radius:8px;
            padding:8px 10px;
        }

        .add-comment button {
            background:var(--accent);
            border:0;
            color:white;
            padding:8px 16px;
            border-radius:8px;
            cursor:pointer;
            transition:.2s;
        }
        .add-comment button:hover {background:#0ea5e9;}

        .btn-back {
            display:inline-block;
            background:var(--card);
            color:var(--accent);
            padding:8px 14px;
            border-radius:8px;
            box-shadow:var(--shadow);
            font-weight:500;
            text-decoration:none;
            transition:.2s;
        }
        .btn-back:hover {
            background:#e0f2fe;
            color:#0369a1;
        }

        .comments {
            margin-top:10px;
            background:#f9fafb;
            border-radius:10px;
            padding:10px;
        }
        .comment {
            border-bottom:1px solid #e5e7eb;
            padding:6px 0;
        }
        .comment:last-child {border:0;}
        .comment strong {font-size:14px;}
        .comment p {margin:2px 0 0;font-size:13px;color:#374151;}
        .add-comment {
            display:flex;
            gap:8px;
            margin-top:8px;
        }
        .add-comment input {
            flex:1;
            border:1px solid #d1d5db;
            border-radius:8px;
            padding:8px 10px;
        }
        .add-comment button {
            background:var(--accent);
            border:0;
            color:white;
            padding:8px 14px;
            border-radius:8px;
            cursor:pointer;
        }

        /* RIGHT: subcategories */
        .right {
            position:sticky;
            top:24px;
            align-self:start;
        }
        .right .category {
            background:var(--card);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            padding:14px;
        }
        .right h5 {margin:0 0 8px 0;}
        .subcat {
            padding:8px 10px;
            border-radius:8px;
            cursor:pointer;
            color:#0f172a;
            margin-bottom:4px;
            transition:.2s;
        }
        .subcat.active {
            background: var(--accent);
            color: white;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(31,182,255,0.25);
        }
        .subcat:hover {
            background: #e0f2fe;
            color: #0369a1;
        }

        .comment-actions {
            margin-top: 6px;
            display: flex;
            gap: 10px;
        }

        .comment-actions button {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 13px;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s;
        }

        .comment-actions button:hover {
            color: var(--accent-2);
        }
        .comment-actions .delete-comment-btn {
            color: #ef4444;
        }
        .comment-actions .delete-comment-btn:hover {
            color: #dc2626;
        }

        /* === Комментарии и ответы === */
        .comments {
            margin-top: 15px;
            background: #f9fafb;
            border-radius: 10px;
            padding: 12px;
        }

        .comment-thread {
            border-bottom: 1px solid #e5e7eb;
            padding: 8px 0;
        }

        .comment-thread:last-child {
            border-bottom: none;
        }

        .comment-main {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .comment-content {
            margin: 0;
            font-size: 14px;
            color: #374151;
        }

        .comment-meta {
            font-size: 12px;
            color: #6b7280;
            display: flex;
            gap: 10px;
        }

        .comment-actions {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .comment-actions button {
            background: none;
            border: none;
            font-size: 13px;
            cursor: pointer;
            color: var(--accent);
            transition: color 0.2s;
            padding: 0;
        }

        .comment-actions button:hover {
            color: var(--accent-2);
        }

        .comment-actions .delete-comment-btn {
            color: #ef4444;
        }
        .comment-actions .delete-comment-btn:hover {
            color: #dc2626;
        }

        .replies {
            margin-left: 20px;
            border-left: 2px solid #e5e7eb;
            padding-left: 10px;
        }

        .reply {
            background: #f3f4f6;
            border-radius: 8px;
            padding: 6px;
            margin-top: 6px;
        }

        .add-reply {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .add-reply input,
        .add-comment input {
            flex: 1;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 8px 10px;
        }

        .add-reply button,
        .add-comment button {
            background: var(--accent);
            border: 0;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* === Комментарии (дерево) === */
        .comments { margin-top: 15px; background: #f9fafb; border-radius: 10px; padding: 12px; }
        .comments-rendered { display: flex; flex-direction: column; gap: 8px; }

        .comment-node {
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 1px 3px rgba(16,24,40,0.04);
            border: 1px solid #eef2f5;
        }

        .comment-header { display:flex; justify-content:space-between; align-items:center; gap:10px; }
        .comment-author { font-weight:600; font-size:14px; color:#0f172a; }
        .comment-content { margin:6px 0 8px; font-size:14px; color:#374151; white-space:pre-wrap; }
        .comment-meta { font-size:12px; color:#6b7280; display:flex; gap:10px; align-items:center; }

        .comment-actions { margin-top:8px; display:flex; gap:8px; }
        .comment-actions button {
            background:none;border:0;color:var(--accent);cursor:pointer;padding:0;font-size:13px;
        }
        .comment-actions button:hover { color:var(--accent-2); }
        .comment-actions .delete-comment-btn { color:#ef4444; }
        .comment-actions .delete-comment-btn:hover { color:#dc2626; }

        /* Вложенные ответы */
        .comment-children { margin-left: 18px; margin-top:8px; display:flex; flex-direction:column; gap:8px; }
        /* Форма для быстрого ответа */
        .inline-reply { display:flex; gap:8px; margin-top:8px; }
        .inline-reply input { flex:1; border:1px solid #d1d5db; border-radius:8px; padding:8px 10px; }
        .inline-reply button { background:var(--accent); border:0; color:white; padding:8px 12px; border-radius:8px; cursor:pointer; }

        /* Поле редактирования комментария (инлайн) */
        .edit-input { width:100%; padding:8px 10px; border-radius:8px; border:1px solid #d1d5db; }
        .save-edit-btn { background:var(--accent); color:#fff; border:0; padding:6px 10px; border-radius:6px; cursor:pointer; margin-left:8px; }
        
        .item-images {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
        }
        .item-images img {
            height: 250px;
            object-fit: cover;
            border-radius: .5rem;
            cursor: pointer;
            transition: transform .15s ease;
        }
        .item-images img:hover {
            transform: scale(1.05);
        }


        @media(max-width:768px){
            .post {
                flex-direction:column;
                padding:18px;
            }
            .avatar-large {
                width:60px;height:60px;font-size:24px;
            }
        }
    </style>
</head>
<body>

<!-- Header -->
<div th:replace="fragments/header :: site-header"></div>

<div class="container py-4">

    <a th:href="@{/market/category/{cat}(cat=${category}, mode=${item.type})}"
       class="back-link mb-3 d-inline-block">
        &larr; Назад к списку
    </a>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row g-4">
        <!-- Изображения товара -->
        <div class="col-12 col-md-6">
            <div class="item-images mb-3" th:if="${item != null && item.medias != null}">
                <th:block th:if="${!item.medias.isEmpty()}">
                    <img th:each="media : ${item.medias}"
                         th:src="${media.uploadUrl}"
                         th:alt="${item.title}"
                         th:title="${item.title}"/>
                </th:block>

                <img th:if="${item.medias.isEmpty()}"
                     src="/default-item.png"
                     th:alt="${item.title}"
                     th:title="${item.title}"/>
            </div>
        </div>

        <!-- Информация о товаре -->
        <div class="col-12 col-md-6">
            <h2 th:text="${item.title}">Название товара</h2>
            <p class="text-muted mb-1" th:text="'Цена: ' + ${item.price} + ' ₽'">Цена</p>
            <p class="text-muted mb-1" th:text="'Локация: ' + ${item.location}">Локация</p>
            <p class="text-muted mb-3" th:text="'Опубликовано: ' + ${item.publicationDate}">Дата публикации</p>

            <h5>Описание:</h5>
            <p th:text="${item.description}">Описание товара...</p>

            <h5>Продавец:</h5>
            <p th:text="${item.authorInfo.username}">Имя пользователя</p>

            <div th:if="${#authentication != null and #authentication.name == item.authorInfo.username}">
                <a class="btn btn-warning mt-3"
                   th:href="@{${item.type} == 'buy' ? '/market/item/edit/' + ${item.id} : '/market/request/edit/' + ${item.id}}">
                    ✏️ <span th:text="${item.type} == 'buy' ? 'Редактировать товар' : 'Редактировать запрос'"></span>
                </a>

                <a class="btn btn-danger mt-3"
                   th:href="@{'/market/item/delete/' + ${item.id}}">
                    🗑️️ Удалить товар
                </a>
            </div>
        </div>
    </div>

    <!-- Комментарии -->
    <div class="mt-4 comments"
         th:attr="data-item-id=${item.id}, data-current-user-id=${#authentication.name}">

        <h5>Комментарии:</h5>

        <!-- raw data -->
        <div class="raw-comments" style="display:none;">
            <div class="raw-comment"
                 th:each="c : ${item.comments}"
                 th:attr="
                data-id=${c.id},
                data-item-id=${c.itemId},
                data-user-id=${c.userId},
                data-reply-id=${c.replyCommentId},
                data-content=${c.content},
                data-created=${c.createdAt}
             ">
            </div>
        </div>

        <div class="comments-rendered"></div>

        <!-- add comment -->
        <div class="add-comment mt-2 d-flex gap-2">
            <input type="text" class="form-control" placeholder="Напишите комментарий...">
            <button class="btn btn-primary send-comment-btn">Отправить</button>
        </div>
    </div>
</div>

<!-- Footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
    document.addEventListener("DOMContentLoaded", () => {

        (function(){
            // Вспомог: создать DOM-узел комментария
            function createCommentNode(data, currentUserId) {
                const node = document.createElement('div');
                node.className = 'comment-node';
                node.dataset.commentId = data.id;

                node.innerHTML = `
            <div class="comment-header">
                <div>
                    <div class="comment-author">Пользователь #${data.userId}</div>
                    <div class="comment-meta">${data.created} · <span class="likes">❤️ ${data.likes}</span></div>
                </div>
                <div></div>
            </div>
            <div class="comment-content" data-content>${escapeHtml(data.content)}</div>
            <div class="comment-actions"></div>
            <div class="comment-children"></div>
        `;

                const actions = node.querySelector('.comment-actions');

                // Reply button
                const replyBtn = document.createElement('button');
                replyBtn.className = 'reply-btn';
                replyBtn.textContent = 'Ответить';
                actions.appendChild(replyBtn);

                // Edit & Delete only if owner
                if (String(currentUserId) === String(data.userId)) {
                    const editBtn = document.createElement('button');
                    editBtn.className = 'edit-comment-btn';
                    editBtn.textContent = 'Редактировать';
                    actions.appendChild(editBtn);

                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-comment-btn';
                    delBtn.textContent = 'Удалить';
                    delBtn.style.marginLeft = '6px';
                    actions.appendChild(delBtn);
                }

                return node;
            }

            // безопасное экранирование для вывода в текстовую ноду
            function escapeHtml(unsafe) {
                if (unsafe == null) return '';
                return String(unsafe)
                    .replaceAll('&', '&amp;')
                    .replaceAll('<', '&lt;')
                    .replaceAll('>', '&gt;')
                    .replaceAll('"', '&quot;')
                    .replaceAll("'", '&#039;');
            }

            // Для каждого .comments на странице
            document.querySelectorAll('.comments').forEach(block => {
                const itemId = block.dataset.itemId;
                const currentUserId = block.dataset.currentUserId;
                const raw = Array.from(block.querySelectorAll('.raw-comment')).map(rc => ({
                    id: rc.dataset.id,
                    itemId: rc.dataset.itemId,
                    userId: rc.dataset.userId,
                    replyId: rc.dataset.replyId === 'null' || rc.dataset.replyId === '' ? null : rc.dataset.replyId,
                    content: rc.dataset.content,
                    likes: rc.dataset.likes || 0,
                    created: rc.dataset.created
                }));

                const renderedContainer = block.querySelector('.comments-rendered');

                // Построить карту id -> nodeData
                const map = {};
                raw.forEach(r => { map[r.id] = Object.assign({}, r, { children: [] }); });

                // Собрать дерево
                const roots = [];
                raw.forEach(r => {
                    const node = map[r.id];
                    if (r.replyId && map[r.replyId]) {
                        map[r.replyId].children.push(node);
                    } else {
                        roots.push(node);
                    }
                });

                // Рекурсивно отрисовать
                function renderNodes(nodes, parentEl) {
                    nodes.forEach(n => {
                        const commentEl = createCommentNode(n, currentUserId);
                        parentEl.appendChild(commentEl);

                        // обработчики кнопок (reply, edit, delete)
                        const replyBtn = commentEl.querySelector('.reply-btn');
                        replyBtn.addEventListener('click', () => {
                            // не дублируем форму
                            if (commentEl.querySelector('.inline-reply')) return;

                            const form = document.createElement('div');
                            form.className = 'inline-reply';
                            form.innerHTML = `<input type="text" placeholder="Ответить..." /><button>Отправить</button>`;
                            commentEl.appendChild(form);

                            const input = form.querySelector('input');
                            const send = form.querySelector('button');

                            send.addEventListener('click', async () => {
                                const content = input.value.trim();
                                if (!content) return;

                                const body = { itemId: Number(itemId), replyCommentId: Number(n.id), content };
                                try {
                                    const resp = await fetch('/market/item/comment/add', {
                                        method: 'POST',
                                        headers: {
                                            "Content-Type": "application/json",
                                            [csrfHeader]: csrfToken
                                        },
                                        body: JSON.stringify(body)
                                    });
                                    if (!resp.ok) throw new Error('Ошибка добавления ответа');
                                    window.location.reload();
                                } catch (err) { console.error(err); }
                            });
                        });

                        const editBtn = commentEl.querySelector('.edit-comment-btn');
                        if (editBtn) {
                            editBtn.addEventListener('click', () => {
                                const contentEl = commentEl.querySelector('[data-content]');
                                const old = contentEl.textContent;
                                const input = document.createElement('input');
                                input.className = 'edit-input';
                                input.value = old;
                                contentEl.replaceWith(input);

                                // добавить кнопки сохранить/отменить
                                const save = document.createElement('button');
                                save.className = 'save-edit-btn';
                                save.textContent = 'Сохранить';
                                const actions = commentEl.querySelector('.comment-actions');
                                actions.appendChild(save);

                                save.addEventListener('click', async () => {
                                    const newText = input.value.trim();
                                    if (!newText) return;
                                    const body = { itemId: Number(itemId), replyCommentId: null, content: newText };
                                    try {
                                        const resp = await fetch(`/market/item/comment/edit/${n.id}`, {
                                            method: 'POST',
                                            headers: {
                                                "Content-Type": "application/json",
                                                [csrfHeader]: csrfToken
                                            },
                                            body: JSON.stringify(body)
                                        });
                                        if (!resp.ok) throw new Error('Ошибка редактирования');
                                        window.location.reload();
                                    } catch (err) { console.error(err); }
                                });
                            });
                        }

                        const delBtn = commentEl.querySelector('.delete-comment-btn');
                        if (delBtn) {
                            delBtn.addEventListener('click', async () => {
                                if (!confirm('Удалить комментарий?')) return;
                                try {
                                    const resp = await fetch(`/market/item/comment/delete/${n.id}`, {
                                        method: 'POST',
                                        headers: {
                                            "Content-Type": "application/json",
                                            [csrfHeader]: csrfToken
                                        }, });
                                    if (!resp.ok) throw new Error('Ошибка удаления');
                                    window.location.reload();
                                } catch (err) { console.error(err); }
                            });
                        }

                        // рендер дочернихК
                        if (n.children && n.children.length) {
                            const childrenContainer = commentEl.querySelector('.comment-children');
                            renderNodes(n.children, childrenContainer);
                        }
                    });
                }

                // Запуск отрисовки
                renderNodes(roots, renderedContainer);

                // --- хендлер добавления нового корневого комментария ---
                const addInput = block.querySelector('.add-comment input');
                const addBtn = block.querySelector('.add-comment .send-comment-btn');
                addBtn.addEventListener('click', async () => {
                    const content = addInput.value.trim();
                    if (!content) return;
                    const body = { itemId: Number(itemId), replyCommentId: null, content };
                    try {
                        const resp = await fetch('/market/item/comment/add', {
                            method: 'POST',
                            headers: {
                                "Content-Type": "application/json",
                                [csrfHeader]: csrfToken
                            },
                            body: JSON.stringify(body)
                        });
                        if (!resp.ok) throw new Error('Ошибка добавления комментария');
                        window.location.reload();
                    } catch (err) { console.error(err); }
                });
            });
        })();

    });
</script>

</body>

</html>
