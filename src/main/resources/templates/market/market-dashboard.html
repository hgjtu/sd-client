<!-- market.html -->
<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Парашютная барахолка</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Общие стили -->
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <!-- Отдельный файл страницы -->
    <link rel="stylesheet" th:href="@{/css/market.css}">
</head>

<body class="market-page">

<div th:replace="fragments/header :: site-header"></div>

<main class="container py-5">

    <section class="hero-market">
        <div>
            <h1>Парашютная барахолка</h1>
            <p>Покупай, продавай и находи нужное снаряжение</p>
        </div>
    </section>

    <!-- ЗАМЕНИ внутренность market-panel НА ЭТО -->

    <section class="market-panel">

        <div class="market-toolbar">

            <!-- ЛЕВО -->
            <div class="mode-wrap">
                <div class="text-muted fw-semibold">Режим:</div>

                <div class="btn-group btn-group-sm" role="group">

                    <input type="radio" class="btn-check" name="mode" id="mode-buy" autocomplete="off" checked>
                    <label class="btn btn-outline-primary mode-pill active"
                           for="mode-buy"
                           data-mode="buy">
                        <i class="bi bi-cart me-2"></i>Купить
                    </label>

                    <input type="radio" class="btn-check" name="mode" id="mode-sell" autocomplete="off">
                    <label class="btn btn-outline-danger mode-pill"
                           for="mode-sell"
                           data-mode="sell">
                        <i class="bi bi-cash-stack me-2"></i>Продать
                    </label>

                </div>
            </div>

            <!-- ПРАВО -->
            <div class="actions-wrap">

                <a href="/market/add-item" class="btn btn-success modern-btn">
                    <i class="bi bi-plus-circle me-2"></i>Добавить товар
                </a>

                <a href="/market/add-request" class="btn btn-warning modern-btn text-dark">
                    <i class="bi bi-pencil-square me-2"></i>Создать заявку
                </a>

                <a href="/market/my-items" class="btn btn-outline-secondary modern-btn">
                    <i class="bi bi-box-seam me-2"></i>Мои товары и заявки
                </a>

            </div>

        </div>

    </section>

    <div th:if="${error}" class="alert alert-danger mb-4" th:text="${error}"></div>

    <div class="row g-4">

        <div class="col-12 col-md-6 col-lg-4"
             th:each="category : ${categories}">

            <div class="card category-card"
                 th:attr="data-slug=${category.name}">

                <img th:src="${category.categoryMediaURL != null} ? ${category.categoryMediaURL} : '/default-category.png'"
                     th:onerror="this.onerror=null; this.src='/default-category.png'"
                     th:alt="${category.nameRu}"
                     class="category-img">

                <div class="card-body">
                    <h5 class="card-title"
                        th:text="${category.nameRu}">
                        Название категории
                    </h5>

                    <p class="card-text small mb-0"
                       th:text="${category.shortDescription}">
                        Краткое описание
                    </p>
                </div>

            </div>

        </div>

    </div>

</main>

<div th:replace="fragments/footer :: site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    (function() {
        let currentMode = 'buy';

        document.querySelectorAll('.mode-pill').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('.mode-pill').forEach(btn => btn.classList.remove('active'));
                el.classList.add('active');
                currentMode = el.dataset.mode;
            });
        });

        document.addEventListener('click', (e) => {
            const card = e.target.closest('.category-card');
            if (card) {
                const slug = card.dataset.slug;
                window.location.href =
                    '/market/category/' + encodeURIComponent(slug) +
                    '?mode=' + encodeURIComponent(currentMode);
            }
        });
    })();
</script>

</body>
</html>
