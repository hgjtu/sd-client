<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Парашютная барахолка</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .category-card {
            cursor: pointer;
            transition: transform .15s ease, box-shadow .15s ease;
        }
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .category-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-top-left-radius: .5rem;
            border-top-right-radius: .5rem;
        }
        .mode-pill {
            min-width: 110px;
        }
    </style>
</head>
<body>

<!-- Подключаем header -->
<div th:replace="fragments/header :: site-header"></div>

<div class="container py-4">

    <!-- Заголовок и тоггл -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
        <div>
            <h1 class="h4 mb-1">Парашютная барахолка</h1>
        </div>

        <div class="d-flex align-items-center gap-3">
            <div class="text-muted small">Режим:</div>
            <div class="btn-group btn-group-sm" role="group">
                <input type="radio" class="btn-check" name="mode" id="mode-buy" autocomplete="off" checked>
                <label class="btn btn-outline-primary mode-pill" for="mode-buy" data-mode="buy">Купить</label>

                <input type="radio" class="btn-check" name="mode" id="mode-sell" autocomplete="off">
                <label class="btn btn-outline-danger mode-pill" for="mode-sell" data-mode="sell">Продать</label>
            </div>
        </div>
    </div>

    <!-- Сообщение об ошибке -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Сетка категорий -->
    <div class="row g-4">
        <!-- Динамическое заполнение -->
        <div class="col-12 col-md-6 col-lg-4" th:each="category : ${categories}">
            <div class="card category-card h-100"
                 th:attr="data-slug=${category.name}">
                <img th:src="@{/images/{name}.jpg(name=${category.name})}"
                     class="category-img"
                     th:alt="${category.nameRu}">
                <div class="card-body">
                    <h5 class="card-title mb-1" th:text="${category.nameRu}">Название категории</h5>
                    <p class="card-text text-muted small mb-0" th:text="${category.shortDescription}">Краткое описание</p>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Подключаем footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    (function() {
        let currentMode = 'buy';

        document.querySelectorAll('.mode-pill').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('.mode-pill').forEach(btn => btn.classList.remove('active'));
                el.classList.add('active');
                currentMode = el.dataset.mode;
            });
        });

        document.addEventListener('click', (e) => {
            const card = e.target.closest('.category-card');
            if (card) {
                const slug = card.dataset.slug;
                window.location.href = '/market/category/' + encodeURIComponent(slug) + '?mode=' + encodeURIComponent(currentMode);
            }
        });
    })();
</script>
</body>
</html>
