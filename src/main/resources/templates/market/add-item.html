<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${item != null} ? 'Редактировать товар' : 'Добавить товар'">Добавить товар</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 25px;
            background: #fff;
            border-radius: 0.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<!-- Подключаем header -->
<div th:replace="fragments/header :: site-header"></div>

<div class="container">

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="form-container">
        <h2 class="mb-4" th:text="${item != null} ? 'Редактировать товар' : 'Добавить новый товар'">Добавить новый товар</h2>

        <form th:action="@{${actionUrl}}" method="post">
            <!-- Название -->
            <div class="mb-3">
                <label for="title" class="form-label">Название товара</label>
                <input type="text" class="form-control" id="title" name="title"
                       th:value="${item != null} ? ${item.title} : ''"
                       placeholder="Введите название" required>
            </div>

            <!-- Категория -->
            <div class="mb-3">
                <label for="categoryId" class="form-label">Категория</label>
                <select class="form-select" id="categoryId" name="categoryId" required>
                    <option value="" disabled th:selected="${item == null}">Выберите категорию</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.nameRu}"
                            th:selected="${item != null} ? ${item.categoryId} == ${category.id} : false">
                    </option>
                </select>
            </div>

            <!-- Описание -->
            <div class="mb-3">
                <label for="description" class="form-label">Описание</label>
                <textarea class="form-control" id="description" name="description" rows="4"
                          placeholder="Введите описание" required
                          th:text="${item != null} ? ${item.description} : ''"></textarea>
            </div>

            <!-- Ссылки на изображения -->
            <div class="mb-3">
                <label for="imagesUrls" class="form-label">Ссылки на изображения (через запятую)</label>
                <input type="text" class="form-control" id="imagesUrls" name="imagesUrls"
                       placeholder="https://example.com/img1.jpg, https://example.com/img2.jpg"
                       th:value="${item != null} ? ${item.imagesUrls} : ''">
            </div>

            <!-- Цена -->
            <div class="mb-3">
                <label for="price" class="form-label">Цена</label>
                <input type="number" class="form-control" id="price" name="price"
                       placeholder="Введите цену" min="0" required
                       th:value="${item != null} ? ${item.price} : ''">
            </div>

            <!-- Местоположение -->
            <div class="mb-3">
                <label for="location" class="form-label">Местоположение</label>
                <input type="text" class="form-control" id="location" name="location"
                       placeholder="Введите город или адрес" required
                       th:value="${item != null} ? ${item.location} : ''">
            </div>

            <button type="submit" class="btn btn-primary"
                    th:text="${item != null} ? 'Сохранить изменения' : 'Добавить товар'">
                Добавить товар
            </button>
            <a href="javascript:history.back()" class="btn btn-secondary ms-2">Отмена</a>
        </form>
    </div>
</div>

<!-- Подключаем footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
