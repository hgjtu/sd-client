<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${item != null} ? 'Редактировать товар' : 'Добавить товар'">Добавить товар</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 25px;
            background: #fff;
            border-radius: 0.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<!-- Подключаем header -->
<div th:replace="fragments/header :: site-header"></div>

<div class="container">

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="form-container">
        <h2 class="mb-4" th:text="${item != null} ? 'Редактировать товар' : 'Добавить новый товар'">Добавить новый товар</h2>

        <form id="itemForm"
              th:action="@{${actionUrl}}"
              method="post">
            <!-- Название -->
            <div class="mb-3">
                <label for="title" class="form-label">Название товара</label>
                <input type="text" class="form-control" id="title" name="title"
                       th:value="${item != null} ? ${item.title} : ''"
                       placeholder="Введите название" required>
            </div>

            <!-- Категория -->
            <div class="mb-3">
                <label for="categoryId" class="form-label">Категория</label>
                <select class="form-select" id="categoryId" name="categoryId" required>
                    <option value="" disabled th:selected="${item == null}">Выберите категорию</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.nameRu}"
                            th:selected="${item != null} ? ${item.categoryId} == ${category.id} : false">
                    </option>
                </select>
            </div>

            <!-- Описание -->
            <div class="mb-3">
                <label for="description" class="form-label">Описание</label>
                <textarea class="form-control" id="description" name="description" rows="4"
                          placeholder="Введите описание" required
                          th:text="${item != null} ? ${item.description} : ''"></textarea>
            </div>

            <!-- Цена -->
            <div class="mb-3">
                <label for="price" class="form-label">Цена</label>
                <input type="number" class="form-control" id="price" name="price"
                       placeholder="Введите цену" min="0" required
                       th:value="${item != null} ? ${item.price} : ''">
            </div>

            <!-- Местоположение -->
            <div class="mb-3">
                <label for="location" class="form-label">Местоположение</label>
                <input type="text" class="form-control" id="location" name="location"
                       placeholder="Введите город или адрес" required
                       th:value="${item != null} ? ${item.location} : ''">
            </div>

            <!-- Фото -->
            <div class="mb-3">
                <label class="form-label">Фотографии (до 10)</label>
                <input type="file"
                       class="form-control"
                       id="photoInput"
                       accept="image/*"
                       multiple>

                <div id="previewContainer" class="d-flex flex-wrap gap-2 mt-3">

                    <th:block th:each="imageUrl : ${item != null ? item.imagesUrls : {}}">
                        <div th:each="imageUrl : ${item.imagesUrls}"
                             class="position-relative"
                             th:attr="data-url=${imageUrl}">

                            <img th:src="${imageUrl}"
                                 style="width:120px;height:120px;object-fit:cover"
                                 class="rounded border"/>

                            <button type="button"
                                    class="btn btn-sm btn-danger position-absolute top-0 end-0"
                                    th:attr="onclick=|deleteExistingMedia('${imageUrl}', this)|">
                                &times;
                            </button>
                        </div>
                    </th:block>

                </div>
            </div>

            <button type="submit" class="btn btn-primary"
                    th:text="${item != null} ? 'Сохранить изменения' : 'Добавить товар'">
                Добавить товар
            </button>
            <a href="javascript:history.back()" class="btn btn-secondary ms-2">Отмена</a>
        </form>
    </div>
</div>

<!-- Подключаем footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    const actionUrl = /*[[${actionUrl}]]*/ "";
</script>
<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute("content");
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute("content");

    const form = document.getElementById("itemForm");
    const actionUrl = form.getAttribute("action");
    const photoInput = document.getElementById("photoInput");
    const previewContainer = document.getElementById("previewContainer");

    const MAX_FILES = 10;

    let pendingFiles = [];   // файлы, которые выбрали до сохранения
    let itemId = null;

    /* ================================
       📸 Выбор файлов (БЕЗ загрузки)
    ================================ */
    photoInput?.addEventListener("change", function () {
        const files = Array.from(photoInput.files);

        if (pendingFiles.length + files.length > MAX_FILES) {
            alert("Можно загрузить максимум 10 фотографий");
            return;
        }

        for (const file of files) {

            if (!file.type.startsWith("image/")) {
                alert("Можно загружать только изображения");
                continue;
            }

            if (file.size > 5 * 1024 * 1024) {
                alert("Максимальный размер файла — 5MB");
                continue;
            }

            pendingFiles.push(file);

            const reader = new FileReader();
            reader.onload = function (e) {
                addPreview(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        photoInput.value = "";
    });

    /* ================================
       🚀 Сохранение Item
    ================================ */
    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const formData = new FormData(form);
        const itemData = Object.fromEntries(formData.entries());

        console.log(itemData); // ПРОВЕРЬ ЧТО ТУТ

        const saveResponse = await fetch(form.action, {
            method: form.method || "POST",
            headers: {
                "Content-Type": "application/json",
                [csrfHeader]: csrfToken
            },
            body: JSON.stringify(itemData)
        });

        if (!saveResponse.ok) {
            alert("Ошибка сохранения");
            return;
        }

        const savedItem = await saveResponse.json();
        itemId = savedItem.id;

        await uploadAllPhotos();

        window.location.href = "/market/items/" + itemId;
    });

    /* ================================
       ☁️ Загрузка всех фото
    ================================ */
    async function uploadAllPhotos() {

        for (const file of pendingFiles) {

            // Получаем presigned URL
            const uploadResponse = await fetch("/media/MARKET/upload-url", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify({
                    fileName: file.name,
                    contentType: file.type
                })
            });

            if (!uploadResponse.ok) throw new Error("Ошибка получения upload-url");

            const uploadData = await uploadResponse.json();
            const uploadUrl = uploadData.uploadUrl;
            const mediaId = uploadData.id;

            // Загружаем в S3 / MinIO
            const s3Response = await fetch(uploadUrl, {
                method: "PUT",
                body: file
            });

            if (!s3Response.ok) throw new Error("Ошибка загрузки в S3");

            // Подтверждаем загрузку
            const completeResponse = await fetch(`/media/MARKET/complete/${mediaId}`, {
                method: "POST",
                headers: {[csrfHeader]: csrfToken}
            });

            if (!completeResponse.ok) throw new Error("Ошибка подтверждения");

            // Привязываем к item
            await fetch(`/api/market-resource/items/add-media/${itemId}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify([mediaId])
            });
        }

        pendingFiles = [];
    }

    /* ================================
       🖼 Предпросмотр
    ================================ */
    function addPreview(src) {
        const wrapper = document.createElement("div");
        wrapper.className = "position-relative";

        const img = document.createElement("img");
        img.src = src;
        img.style.width = "120px";
        img.style.height = "120px";
        img.style.objectFit = "cover";
        img.className = "rounded border";

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.innerHTML = "&times;";
        removeBtn.className = "btn btn-sm btn-danger position-absolute top-0 end-0";

        removeBtn.onclick = () => {
            pendingFiles = pendingFiles.filter(f => f !== src);
            wrapper.remove();
        };

        wrapper.appendChild(img);
        wrapper.appendChild(removeBtn);
        previewContainer.appendChild(wrapper);
    }
</script>
</body>
</html>
