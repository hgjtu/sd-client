<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${item != null} ? 'Редактировать товар' : 'Добавить товар'">Добавить товар</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 25px;
            background: #fff;
            border-radius: 0.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .media-preview {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 0.25rem;
            border: 1px solid #dee2e6;
        }
        .preview-wrapper {
            position: relative;
            display: inline-block;
        }
        .removed {
            opacity: 0.5;
            pointer-events: none;
        }
        .removed button {
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- Подключаем header -->
<div th:replace="fragments/header :: site-header"></div>

<div class="container">

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="form-container">
        <h2 class="mb-4" th:text="${item != null} ? 'Редактировать товар' : 'Добавить новый товар'">Добавить новый товар</h2>

        <form id="itemForm"
              th:action="@{${actionUrl}}"
              method="post">
            <!-- Название -->
            <div class="mb-3">
                <label for="title" class="form-label">Название товара</label>
                <input type="text" class="form-control" id="title" name="title"
                       th:value="${item != null} ? ${item.title} : ''"
                       placeholder="Введите название" required>
            </div>

            <!-- Категория -->
            <div class="mb-3">
                <label for="categoryId" class="form-label">Категория</label>
                <select class="form-select" id="categoryId" name="categoryId" required>
                    <option value="" disabled th:selected="${item == null}">Выберите категорию</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.nameRu}"
                            th:selected="${item != null} ? ${item.categoryId} == ${category.id} : false">
                    </option>
                </select>
            </div>

            <!-- Описание -->
            <div class="mb-3">
                <label for="description" class="form-label">Описание</label>
                <textarea class="form-control" id="description" name="description" rows="4"
                          placeholder="Введите описание" required
                          th:text="${item != null} ? ${item.description} : ''"></textarea>
            </div>

            <!-- Цена -->
            <div class="mb-3">
                <label for="price" class="form-label">Цена</label>
                <input type="number" class="form-control" id="price" name="price"
                       placeholder="Введите цену" min="0" required
                       th:value="${item != null} ? ${item.price} : ''">
            </div>

            <!-- Местоположение -->
            <div class="mb-3">
                <label for="location" class="form-label">Местоположение</label>
                <input type="text" class="form-control" id="location" name="location"
                       placeholder="Введите город или адрес" required
                       th:value="${item != null} ? ${item.location} : ''">
            </div>

            <!-- Фото -->
            <div class="mb-3">
                <label class="form-label">Фотографии (до 10)</label>
                <input type="file"
                       class="form-control"
                       id="photoInput"
                       accept="image/*"
                       multiple>

                <div id="previewContainer" class="d-flex flex-wrap gap-2 mt-3">
                    <!-- Существующие медиа -->
                    <th:block th:if="${item != null && item.medias != null && !item.medias.isEmpty()}">
                        <div th:each="media : ${item.medias}"
                             class="preview-wrapper existing-media"
                             th:attr="data-media-id=${media.id}">

                            <img th:src="${media.uploadUrl}" class="media-preview" alt="Media preview">

                            <button type="button"
                                    class="btn btn-sm btn-danger position-absolute top-0 end-0 remove-existing"
                                    th:attr="onclick=|removeExistingMedia('${media.id}', this)|">
                                ×
                            </button>
                        </div>
                    </th:block>
                </div>
                <small class="text-muted">Можно загрузить до 10 изображений. Максимальный размер: 10MB</small>
            </div>

            <button type="submit" class="btn btn-primary"
                    th:text="${item != null} ? 'Сохранить изменения' : 'Добавить товар'">
                Добавить товар
            </button>
            <a href="javascript:history.back()" class="btn btn-secondary ms-2">Отмена</a>
        </form>
    </div>
</div>

<!-- Подключаем footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute("content");
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute("content");

    const form = document.getElementById("itemForm");
    const photoInput = document.getElementById("photoInput");
    const previewContainer = document.getElementById("previewContainer");

    const MAX_FILES = 10;
    const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB

    let pendingFiles = [];
    let removedMediaIds = [];
    let itemId = "[[${item != null ? item.id : ''}]]";
    if (itemId) {
        itemId = parseInt(itemId);
    } else {
        itemId = null;
    }

    /* ================================
       📸 Выбор файлов
    ================================ */
    photoInput?.addEventListener("change", function (event) {
        const files = Array.from(event.target.files);
        const existingMediaCount = document.querySelectorAll('.existing-media:not(.removed)').length;

        if (existingMediaCount + pendingFiles.length + files.length > MAX_FILES) {
            alert(`Можно загрузить максимум ${MAX_FILES} изображений`);
            photoInput.value = "";
            return;
        }

        for (const file of files) {
            // Проверка типа файла
            if (!file.type.startsWith("image/")) {
                alert(`Файл ${file.name} не является изображением`);
                continue;
            }

            // Проверка размера
            if (file.size > MAX_FILE_SIZE) {
                alert(`Файл ${file.name} превышает максимальный размер ${MAX_FILE_SIZE / 1024 / 1024}MB`);
                continue;
            }

            // Добавляем файл в массив
            pendingFiles.push(file);

            // Создаём preview
            const reader = new FileReader();
            reader.onload = function (e) {
                createPreview(e.target.result, file);
            };
            reader.readAsDataURL(file);
        }

        // Очищаем input
        photoInput.value = "";
    });

    /* ================================
       🚀 СОХРАНЕНИЕ
    ================================ */
    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        try {
            // 1. Сначала сохраняем/обновляем товар
            const formData = new FormData(form);
            const itemData = Object.fromEntries(formData.entries());
            delete itemData._csrf;

            console.log('Saving item:', itemData);

            const saveResponse = await fetch(form.action, {
                method: form.method || "POST",
                headers: {
                    "Content-Type": "application/json",
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify(itemData)
            });

            if (!saveResponse.ok) {
                const errorText = await saveResponse.text();
                throw new Error(errorText || "Ошибка сохранения товара");
            }

            // Получаем ID товара
            const responseText = await saveResponse.text();
            itemId = responseText ? parseInt(responseText) : itemId;

            if (!itemId) {
                throw new Error("Не удалось получить ID товара");
            }

            console.log('Item saved with ID:', itemId);

            // 2. Удаляем помеченные фото (последовательно)
            if (removedMediaIds.length > 0) {
                await deleteMarkedMediaSequentially();
            }

            // 3. Загружаем новые фото
            if (pendingFiles.length > 0) {
                await uploadAllPhotos();
            }

            // 4. Перенаправляем на страницу товара
            window.location.href = "/market/item/" + itemId;

        } catch (error) {
            console.error('Error:', error);
            alert("Ошибка при сохранении: " + error.message);
        }
    });

    /* ================================
       ☁️ Загрузка всех фото
    ================================ */
    async function uploadAllPhotos() {
        const uploadedMediaIds = [];

        for (const file of pendingFiles) {
            try {
                console.log('Uploading file:', file.name);

                // Получаем presigned URL
                const uploadResponse = await fetch(`/media/MARKET/upload-url/item/${itemId}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify({
                        fileName: file.name,
                        contentType: file.type
                    })
                });

                if (!uploadResponse.ok) {
                    const errorText = await uploadResponse.text();
                    throw new Error(`Ошибка получения upload-url: ${errorText}`);
                }

                const uploadData = await uploadResponse.json();
                console.log('Upload data:', uploadData);

                const uploadUrl = uploadData.uploadUrl;
                const mediaId = uploadData.id;

                // Загружаем в S3 / MinIO
                const s3Response = await fetch(uploadUrl, {
                    method: "PUT",
                    body: file,
                    headers: {
                        'Content-Type': file.type
                    }
                });

                if (!s3Response.ok) {
                    throw new Error("Ошибка загрузки в хранилище");
                }

                // Подтверждаем загрузку
                const completeResponse = await fetch(`/media/MARKET/complete/${mediaId}`, {
                    method: "POST",
                    headers: {
                        [csrfHeader]: csrfToken
                    }
                });

                if (!completeResponse.ok) {
                    throw new Error("Ошибка подтверждения загрузки");
                }

                uploadedMediaIds.push(mediaId);
                console.log('File uploaded successfully, media ID:', mediaId);

            } catch (error) {
                console.error('Error uploading file:', file.name, error);
                alert(`Ошибка при загрузке файла ${file.name}: ${error.message}`);
            }
        }

        // Привязываем все загруженные медиа к товару
        if (uploadedMediaIds.length > 0) {
            await addMediaToItem(uploadedMediaIds);
        }

        pendingFiles = [];
    }

    /* ================================
       🔗 Привязка медиа к товару
    ================================ */
    async function addMediaToItem(mediaIds) {
        try {
            console.log('Adding media to item:', mediaIds);

            const addMediaResponse = await fetch(`/market/items/add-media/${itemId}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify(mediaIds)
            });

            if (!addMediaResponse.ok) {
                const errorText = await addMediaResponse.text();
                throw new Error(`Ошибка привязки медиа к товару: ${errorText}`);
            }

            console.log('Media added successfully');
        } catch (error) {
            console.error('Error adding media to item:', error);
            alert("Ошибка при привязке медиа: " + error.message);
        }
    }

    /* ================================
       🖼 Предпросмотр
    ================================ */
    function createPreview(src, file) {
        const wrapper = document.createElement("div");
        wrapper.className = "preview-wrapper pending-media";

        const img = document.createElement("img");
        img.src = src;
        img.alt = "Preview";
        img.className = "media-preview";

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.innerHTML = "×";
        removeBtn.className = "btn btn-sm btn-danger position-absolute top-0 end-0";
        removeBtn.onclick = () => {
            // Удаляем файл из массива
            const index = pendingFiles.findIndex(f => f === file);
            if (index !== -1) {
                pendingFiles.splice(index, 1);
            }
            wrapper.remove();
        };

        wrapper.appendChild(img);
        wrapper.appendChild(removeBtn);
        previewContainer.appendChild(wrapper);
    }

    /* ================================
       🗑 Удаление существующих медиа
    ================================ */
    window.removeExistingMedia = function(mediaId, button) {
        if (!confirm('Удалить фото?')) return;

        // Добавляем ID в список удаленных
        if (!removedMediaIds.includes(mediaId)) {
            removedMediaIds.push(mediaId);
        }

        // Помечаем элемент как удаленный
        const wrapper = button.closest('.preview-wrapper');
        if (wrapper) {
            wrapper.classList.add('removed');
            button.disabled = true;
            button.innerHTML = '✓';
        }

        console.log('Marked for removal:', mediaId);
    };

    async function deleteMarkedMediaSequentially() {
        console.log('Deleting media sequentially:', removedMediaIds);

        for (const mediaId of removedMediaIds) {
            try {
                const deleteResponse = await fetch(`/market/items/delete-media/${itemId}/${mediaId}`, {
                    method: "DELETE",
                    headers: {
                        [csrfHeader]: csrfToken
                    }
                });

                if (!deleteResponse.ok) {
                    const errorText = await deleteResponse.text();
                    console.error(`Ошибка удаления медиа ${mediaId}:`, errorText);
                } else {
                    console.log(`Media ${mediaId} deleted successfully`);
                }
            } catch (error) {
                console.error(`Error deleting media ${mediaId}:`, error);
            }
        }

        removedMediaIds = [];
    }
</script>
</body>
</html>
