<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .user-info { background: #f8f9fa; padding: 20px; border-radius: 5px; }
        .attributes { background: #e9ecef; padding: 15px; border-radius: 5px;
            overflow-x: auto; }
        .button { display: inline-block; padding: 10px 20px; background: #6c757d;
            color: white; text-decoration: none; border-radius: 5px; }
        .button:hover { background: #545b62; }
    </style>
</head>
<body>
<div class="container">
    <h1>Dashboard</h1>

    <div class="user-info" th:if="${name} or ${sub}">
        <h2>Welcome, <span th:text="${name ?: sub}">User</span>!</h2>
        <p th:if="${email}">Email: <span th:text="${email}"></span></p>
        <p>Subject: <span th:text="${sub}"></span></p>
    </div>

    <div th:if="${attributes}">
        <h3>User Attributes:</h3>
        <pre class="attributes" th:text="${attributes}">
        User attributes will be displayed here
    </pre>
    </div>

    <div style="margin-top: 30px;">
        <a href="/" class="button">Home</a>
        <a href="/logout" class="button" style="margin-left: 10px;">Logout</a>
    </div>
</div>
</body>
</html>
