<!-- templates/login.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход — Skydive Club</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Подключаем header -->
<div th:replace="fragments/header :: site-header"></div>

<!-- Основной контент -->
<main class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm">
        <div class="card-body text-center">
            <h2 class="card-title mb-3">Вход в систему</h2>
            <p class="text-muted">Выберите способ авторизации:</p>

            <a href="/oauth2/authorization/web-client" class="btn btn-success btn-lg w-100 mb-3">
                Войти через OAuth2 сервер
            </a>

            <a href="/" class="btn btn-outline-secondary w-100">Вернуться на главную</a>
        </div>
    </div>
</main>

<!-- Подключаем footer -->
<div th:replace="fragments/footer :: site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
