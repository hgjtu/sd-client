spring.application.name=auth-client
server.port=5050

server.servlet.session.cookie.name=CLIENT_SESSION

spring.security.oauth2.client.registration.web-client.client-id=web-client
spring.security.oauth2.client.registration.web-client.client-secret=secret
spring.security.oauth2.client.registration.web-client.scope=read
spring.security.oauth2.client.registration.web-client.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.web-client.redirect-uri="{baseUrl}/login/oauth2/code/{registrationId}"

spring.security.oauth2.client.provider.web-client.authorization-uri=http://localhost:9090/oauth2/authorize
spring.security.oauth2.client.provider.web-client.token-uri=http://localhost:9090/oauth2/token
spring.security.oauth2.client.provider.web-client.user-info-uri=http://localhost:9090/userinfo
spring.security.oauth2.client.provider.web-client.user-name-attribute=sub


spring.security.oauth2.client.registration.web-client-cc.client-id=web-client
spring.security.oauth2.client.registration.web-client-cc.client-secret=secret
spring.security.oauth2.client.registration.web-client-cc.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.web-client-cc.scope=registration

spring.security.oauth2.client.provider.web-client-cc.token-uri=http://localhost:9090/oauth2/token

AUTH_SERVER_URL=http://localhost:9090/
USER_RESOURCE_SERVER_URL=http://localhost:7070/
MARKET_RESOURCE_SERVER_URL=http://localhost:7071/
COMMUNICATION_RESOURCE_SERVER_URL=http://localhost:7072/

GATEWAY_SERVICE_URL=http://localhost:3030/
USER_RESOURCE_PREFIX=/api/users-resource
MARKET_RESOURCE_PREFIX=/api/market-resource
COMMUNICATION_RESOURCE_PREFIX=/api/communication-resource

logging.level.org.springframework.security=DEBUG